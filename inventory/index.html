<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>飞速盘点 · 授权版</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@0.19.1"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{background:linear-gradient(135deg,#667eea,#764ba2);font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;margin:0;padding:0;min-height:100vh;overflow:hidden;position:fixed;inset:0;width:100%;height:100%}
        .main-card{background:#fff;width:100%;height:100vh;display:flex;flex-direction:column;overflow:hidden}
        .header-fixed{flex-shrink:0;background:#fff;z-index:20}
        .bottom-fixed-btns{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:12px 16px;box-shadow:0 -4px 20px rgba(0,0,0,.15);z-index:100;border-top:1px solid #e2e8f0}
        .scrollable-area{flex:1;overflow-y:auto;padding:0 16px 16px}
        .table-container{background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow-x:auto}
        table{border-collapse:collapse;width:100%}
        th{position:sticky;top:0;background:linear-gradient(135deg,#1e293b,#0f172a);color:#fff;border:1px solid #334155;padding:12px;font-size:13px;white-space:nowrap}
        td{border:1px solid #e2e8f0;padding:8px;white-space:nowrap}
        .qty-input{width:100%;min-width:80px;height:46px;border:3px solid #3b82f6!important;text-align:center;font-size:1.2rem;font-weight:900;border-radius:10px;background:#f0f9ff}
        .row-focus{background:linear-gradient(90deg,#fef08a,#fde047)!important}
        #toast{position:fixed;top:20%;left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;padding:10px 20px;border-radius:40px;z-index:10000;display:none;font-weight:700;white-space:nowrap}
        #colModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;align-items:center;justify-content:center}
        .modal-content{background:#fff;border-radius:24px;width:350px;padding:20px}
        .scan-frame{position:absolute;top:25%;left:50%;transform:translate(-50%,-50%);width:80%;height:220px;border:3px solid #3b82f6;border-radius:20px;box-shadow:0 0 0 2000px rgba(0,0,0,.75);pointer-events:none}
        .scan-line{position:absolute;width:100%;height:4px;background:linear-gradient(90deg,transparent,#3b82f6,#60a5fa,#3b82f6,transparent);animation:scanLineMove 1.2s infinite}
        @keyframes scanLineMove{0%,100%{top:5%}50%{top:95%}}
        .bottom-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:600px;margin:0 auto}
        .bottom-btn{padding:14px;border-radius:14px;font-weight:bold;text-align:center;cursor:pointer}
        .cam-btn-large{background:#3b82f6;color:#fff;font-size:28px}
        .keyboard-btn{background:#8b5cf6;color:#fff;font-size:28px}
        .close-scan-btn{background:linear-gradient(135deg,#ef4444,#dc2626);padding:12px 24px;border-radius:50px;border:2px solid #fff;cursor:pointer}
        .scan-header{background:#000;border-bottom:3px solid #3b82f6;padding:12px}
        .btn-group-4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:16px 0}
        .action-btn{padding:10px;border-radius:12px;font-weight:bold;text-align:center;cursor:pointer}
        #manualInput{width:100%;padding:12px;border:2px solid #e2e8f0;border-radius:12px;font-size:16px;font-weight:bold}
        .scan-tool-btn{background:#1e3a8a;color:#fff;border-radius:9999px;padding:8px 16px;font-size:14px}
        .focus-guide{position:absolute;top:10px;left:0;right:0;text-align:center;background:rgba(0,0,0,.6);padding:6px 12px;border-radius:20px;width:fit-content;margin:0 auto;font-size:11px;color:#fff;z-index:20}
        #authModal{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:20000;display:flex;align-items:center;justify-content:center}
        .auth-box{background:#fff;border-radius:32px;padding:32px;width:90%;max-width:380px;text-align:center}
        .auth-box input{width:100%;padding:14px;margin:20px 0;border:2px solid #e2e8f0;border-radius:20px;font-size:18px;text-align:center}
        .auth-box button{background:#3b82f6;color:#fff;border:none;padding:12px;border-radius:32px;font-weight:bold;width:100%;cursor:pointer}
        .error-msg{color:#dc2626;margin-top:12px}
    </style>
</head>
<body>
<div id="toast"></div>
<div id="colModal"><div class="modal-content"><h2 class="font-bold text-lg mb-2">📋 列管理</h2><div id="colList"></div><div class="flex gap-2 mt-3"><input type="text" id="newColName" placeholder="新列名" class="flex-1 border rounded px-2 py-1"><button onclick="addColumn()" class="bg-blue-600 text-white px-3 py-1 rounded">添加</button></div><button onclick="closeColModal()" class="w-full mt-4 bg-gray-800 text-white py-2 rounded">完成</button></div></div>

<div class="main-card"><div class="header-fixed"><div class="bg-gradient-to-r from-blue-600 to-purple-600 p-4 text-center font-bold text-2xl">⚡ 飞速盘点 <span class="text-sm">授权版</span></div><div class="p-3"><input id="manualInput" placeholder="📱 输入条码/编码/名称..."><div class="btn-group-4"><button onclick="openColModal()" class="action-btn bg-gray-700 text-white">📊 列管理</button><label class="action-btn bg-green-600 text-white cursor-pointer">📂 导入<input type="file" id="fileInput" class="hidden" accept=".xlsx,.xls"></label><button onclick="exportExcel()" class="action-btn bg-green-600 text-white">💾 导出</button><button id="confirmBtn" class="action-btn bg-blue-600 text-white">✅ 确认</button></div></div></div><div class="scrollable-area"><div class="table-container"><table id="mainTable"><thead id="tHead"></thead><tbody id="tBody"></tbody><table></div></div></div>

<div class="bottom-fixed-btns"><div class="bottom-btns"><button id="scanBtn" class="bottom-btn bg-blue-600 text-white cam-btn-large">📷 扫码</button><button onclick="hardReset()" class="bottom-btn bg-red-600 text-white">🗑️ 重置</button><button id="showKeyboardBtn" class="bottom-btn bg-purple-600 text-white keyboard-btn">⌨️ 键盘</button></div></div>

<div id="scanUI" class="fixed inset-0 bg-black hidden flex-col z-[999]"><div class="scan-header flex justify-between"><span class="text-blue-400 font-bold">🔍 扫描引擎</span><button onclick="stopScanning()" class="close-scan-btn text-white">✕ 关闭</button></div><div class="relative flex-1"><video id="video" class="w-full h-full object-cover" autoplay muted playsinline></video><div class="focus-guide">💡 点击屏幕对焦</div><div class="scan-frame" id="scanFrame"><div class="scan-line"></div></div><div class="absolute bottom-8 left-0 right-0 text-center"><button id="torchBtn" class="scan-tool-btn">🔦 补光</button></div></div></div>

<div id="authModal" style="display: flex;"><div class="auth-box"><div style="font-size:36px">🔐</div><h2>请输入使用码</h2><input type="text" id="authCode" placeholder="使用码"><button id="authBtn">验证</button><div id="authError" class="error-msg"></div></div></div>

<script>
(function(){
    const AUTH_KEY = "FeiSu_Auth";
    const VALID_DAYS = 30;
    let db = [], columns = [];
    let scanning = false, reader = null;
    let lastCode = "", lastTime = 0;
    let jumpIdx = null;
    
    function showToast(msg, isErr){let t=document.getElementById('toast'); t.textContent=msg; t.style.background=isErr?'#dc2626':'#10b981'; t.style.display='block'; setTimeout(()=>t.style.display='none',1500);}
    function beep(ok){try{let a=new (AudioContext||webkitAudioContext)(), o=a.createOscillator(), g=a.createGain(); o.connect(g); g.connect(a.destination); o.frequency.value=ok?1200:400; g.gain.value=0.3; o.start(); g.gain.exponentialRampToValueAtTime(0.00001,a.currentTime+0.2); o.stop(a.currentTime+0.2); a.resume();}catch(e){}}
    function cleanCode(c){if(!c)return c; let r=c.replace(/[^\w\d\-]/g,''); if(r.startsWith('*')&&r.endsWith('*')) r=r.slice(1,-1); if(r.length===12&&/^\d+$/.test(r)) r='0'+r; return r;}
    function matchRow(code){if(!code||!db.length)return -1; let cs=String(code).trim(); for(let i=0;i<db.length;i++){let r=db[i];for(let k in r){let v=String(r[k]||'').trim();if(v===cs||cleanCode(v)===cleanCode(cs)||v.toLowerCase()===cs.toLowerCase()) return i;}} return -1;}
    function findBestMatch(q){if(!q||!db.length)return -1; let idx=matchRow(q); if(idx!==-1)return idx; let norm=cleanCode(q).toLowerCase(); for(let i=0;i<db.length;i++){let vals=Object.values(db[i]).map(v=>String(v).trim());for(let v of vals){if(v.toLowerCase().startsWith(norm)||cleanCode(v).toLowerCase().startsWith(norm)) return i;}} return -1;}
    function jumpToRow(i){let r=document.getElementById(`row-${i}`);if(r){document.querySelectorAll('#mainTable tbody tr').forEach(tr=>tr.classList.remove('row-focus'));r.classList.add('row-focus');r.scrollIntoView({behavior:'smooth',block:'center'});let inp=document.getElementById(`qty-${i}`);if(inp){setTimeout(()=>{inp.focus();inp.select();},200);}}}
    function handleBarcode(code, fromCam){if(!code)return;let now=Date.now(),cs=String(code).trim();if(cs===lastCode&&now-lastTime<200)return;lastCode=cs;lastTime=now;let idx=findBestMatch(cs);if(idx===-1){beep(false);showToast(`❌ 无此条码: ${cs.substring(0,20)}`,true);return;}beep(true);showToast(`✅ ${db[idx]['商品名称']||cs}`,false);if(fromCam){scanning=false;if(reader)try{reader.reset();}catch(e){}reader=null;document.getElementById('scanUI').style.display='none';jumpToRow(idx);}else{jumpToRow(idx);}}
    async function startScan(){if(scanning)return;scanning=true;document.getElementById('scanUI').style.display='flex';try{let cons={video:{facingMode:{exact:"environment"},width:{ideal:1280},height:{ideal:720}}};let h=new Map();h.set(ZXing.DecodeHintType.TRY_HARDER,true);h.set(ZXing.DecodeHintType.POSSIBLE_FORMATS,[ZXing.BarcodeFormat.EAN_13,ZXing.BarcodeFormat.CODE_128]);reader=new ZXing.BrowserMultiFormatReader(h);reader.timeBetweenDecodingAttempts=50;await reader.decodeFromConstraints(cons,'video',(res)=>{if(res&&scanning)handleBarcode(res.getText(),true);});}catch(e){showToast("摄像头启动失败",true);stopScanning();}}
    function stopScanning(){scanning=false;if(reader)try{reader.reset();}catch(e){}reader=null;let v=document.getElementById('video');if(v&&v.srcObject){v.srcObject.getTracks().forEach(t=>t.stop());v.srcObject=null;}document.getElementById('scanUI').style.display='none';}
    function render(){let th=document.getElementById('tHead'),tb=document.getElementById('tBody');if(!columns.length){tb.innerHTML='<tr><td class="p-6 text-center">暂无数据</td></tr>';return;}th.innerHTML=`<tr>${columns.map(c=>`<th>${c}</th>`).join('')}</tr>`;tb.innerHTML=db.map((row,idx)=>`<tr id="row-${idx}">${columns.map(col=>`<td>${col==='实际数量'?`<input id="qty-${idx}" type="number" value="${row[col]||''}" class="qty-input" onchange="updateQty(${idx},this.value)">`:`<input type="text" value="${escapeHtml(row[col]||'')}" class="w-full p-1 border-none" onchange="updateCell(${idx},'${col}',this.value)">`}</td>`).join('')}</tr>`).join('');}
    function escapeHtml(s){return String(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]||m));}
    function updateQty(i,v){db[i]['实际数量']=v;saveData();showToast("已保存",false);}
    function updateCell(i,c,v){db[i][c]=v;saveData();}
    function saveData(){try{localStorage.setItem("FEI_DATA",JSON.stringify({db,columns}));}catch(e){}}
    function loadData(){try{let d=localStorage.getItem("FEI_DATA");if(d){let p=JSON.parse(d);db=p.db||[];columns=p.columns||[];}}catch(e){}if(!columns.length)columns=['实际数量','商品名称','编码','价格'];db.forEach(r=>{if(r['实际数量']===undefined)r['实际数量']='';});render();}
    function importExcel(file){let r=new FileReader();r.onload=function(e){try{let wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});let sheet=wb.Sheets[wb.SheetNames[0]];let json=XLSX.utils.sheet_to_json(sheet,{defval:""});if(json.length){columns=Object.keys(json[0]);if(!columns.includes('实际数量'))columns.unshift('实际数量');db=json.map(row=>({...row,['实际数量']:row['实际数量']||''}));saveData();render();showToast(`✅ 导入成功 ${db.length} 条`,false);}else showToast("文件无数据",true);}catch(err){showToast("解析失败",true);}};r.readAsArrayBuffer(file);}
    function exportExcel(){if(!db.length){showToast("无数据",true);return;}let ws=XLSX.utils.json_to_sheet(db,{header:columns});let wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"库存");XLSX.writeFile(wb,`飞速盘点_${new Date().toLocaleDateString()}.xlsx`);showToast("✅ 导出成功",false);}
    function hardReset(){if(confirm("清空所有数据？")){localStorage.removeItem("FEI_DATA");db=[];columns=['实际数量','商品名称','编码','价格'];saveData();render();showToast("已重置",false);}}
    function openColModal(){let c=document.getElementById('colList');c.innerHTML=columns.map((col,idx)=>`<div class="flex justify-between p-2 border rounded mb-1"><span>${idx+1}. ${col}</span><div><button onclick="moveUp(${idx})" class="bg-blue-500 text-white px-2 rounded">⬆️</button><button onclick="moveDown(${idx})" class="bg-blue-500 text-white px-2 rounded ml-1">⬇️</button><button onclick="deleteColumn('${col}')" class="bg-red-500 text-white px-2 rounded ml-1">删</button></div></div>`).join('');document.getElementById('colModal').style.display='flex';}
    function closeColModal(){document.getElementById('colModal').style.display='none';render();}
    function addColumn(){let n=document.getElementById('newColName').value.trim();if(n&&!columns.includes(n)){columns.push(n);db.forEach(r=>r[n]='');closeColModal();openColModal();render();saveData();showToast(`已添加列: ${n}`,false);document.getElementById('newColName').value='';}else showToast("列名已存在",true);}
    function deleteColumn(cn){if(confirm(`删除列 "${cn}" ？`)){let i=columns.indexOf(cn);if(i!==-1){columns.splice(i,1);db.forEach(r=>delete r[cn]);render();saveData();openColModal();showToast(`已删除 ${cn}`,false);}}}
    function moveUp(i){if(i>0){[columns[i-1],columns[i]]=[columns[i],columns[i-1]];render();openColModal();saveData();}}
    function moveDown(i){if(i<columns.length-1){[columns[i+1],columns[i]]=[columns[i],columns[i+1]];render();openColModal();saveData();}}
    
    window.updateQty=updateQty;window.updateCell=updateCell;window.openColModal=openColModal;window.closeColModal=closeColModal;window.addColumn=addColumn;window.deleteColumn=deleteColumn;window.moveUp=moveUp;window.moveDown=moveDown;window.exportExcel=exportExcel;window.hardReset=hardReset;window.startScanning=startScan;window.stopScanning=stopScanning;
    document.getElementById('fileInput').onchange=e=>{if(e.target.files[0])importExcel(e.target.files[0]);e.target.value='';};
    document.getElementById('confirmBtn').onclick=()=>{let inp=document.getElementById('manualInput');if(inp.value.trim()){handleBarcode(inp.value,false);inp.value='';}};
    document.getElementById('scanBtn').onclick=()=>{if(scanning)stopScanning();else startScan();};
    document.getElementById('showKeyboardBtn').onclick=()=>document.getElementById('manualInput').focus();
    document.getElementById('manualInput').onkeypress=e=>{if(e.key==='Enter'){let inp=e.target;if(inp.value.trim()){handleBarcode(inp.value,false);inp.value='';}}};
    
    async function verifyRemote(code){try{let r=await fetch('/api/auth?code='+encodeURIComponent(code));let j=await r.json();return j.valid===true;}catch(e){return false;}}
    async function onAuth(){let inp=document.getElementById('authCode'),code=inp.value.trim(),err=document.getElementById('authError');if(!code){err.innerText='请输入使用码';return;}let btn=document.getElementById('authBtn'),txt=btn.innerText;btn.innerText='验证中...';btn.disabled=true;let ok=await verifyRemote(code);btn.innerText=txt;btn.disabled=false;if(ok){localStorage.setItem(AUTH_KEY,JSON.stringify({code,expire:Date.now()+VALID_DAYS*86400000}));document.getElementById('authModal').style.display='none';loadData();}else{err.innerText='使用码无效';inp.value='';}}
    function checkAuth(){let a=localStorage.getItem(AUTH_KEY);if(a){let d=JSON.parse(a);if(d.expire>Date.now()){document.getElementById('authModal').style.display='none';loadData();return;}}document.getElementById('authModal').style.display='flex';document.getElementById('authBtn').onclick=onAuth;document.getElementById('authCode').addEventListener('keypress',e=>{if(e.key==='Enter')onAuth();});}
    checkAuth();
})();
</script>
</body>
</html>
