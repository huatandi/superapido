<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>SuperRapido V7 - 自动锁定版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        html, body { min-height: 100vh; background-color: #f1f5f9; }
        .table-container { background: white; border-radius: 12px; overflow: auto; border: 1px solid #cbd5e1; height: 70vh; }
        
        /* 数量框：超大加粗 */
        .qty-input { border: 3px solid #2563eb !important; background: #eff6ff !important; font-weight: 900; text-align: center; font-size: 1.4rem; border-radius: 8px; transition: all 0.2s; }
        .qty-input:focus { background: #dbeafe !important; transform: scale(1.05); box-shadow: 0 0 15px rgba(37,99,235,0.4); }

        /* 自动锁定高亮动画 */
        @keyframes highlightTarget {
            0% { background-color: #fef08a; }
            50% { background-color: #fde047; }
            100% { background-color: #fef08a; }
        }
        .row-active { animation: highlightTarget 1s infinite; border: 2px solid #eab308 !important; }
        
        th { position: relative; border-right: 1px solid #cbd5e1; padding: 12px 8px !important; }
        .resizer { position: absolute; right: 0; top: 0; width: 30px; height: 100%; z-index: 50; cursor: col-resize; touch-action: none; display: flex; align-items: center; justify-content: center; }
        .resizer::after { content: ""; width: 4px; height: 40%; background: #94a3b8; border-radius: 2px; }
        
        @keyframes scanMove { 0% { top: 0%; } 100% { top: 100%; } }
        .scanner-line { position: absolute; width: 100%; height: 2px; background: #60a5fa; box-shadow: 0 0 15px #60a5fa; animation: scanMove 2s linear infinite; }
    </style>
</head>
<body class="p-2">
    <div id="app" class="flex flex-col h-screen">
        <div class="flex justify-between items-center mb-2 px-1">
            <h1 class="text-2xl font-black text-blue-900 italic tracking-tighter">SuperRapido <span class="text-xs text-red-500 font-bold">V7-AUTO</span></h1>
            <button onclick="resetSystem()" class="text-[10px] text-gray-400">重置</button>
        </div>

        <div class="flex gap-2 mb-3 bg-white p-2 rounded-xl shadow-sm border border-slate-200">
            <label class="bg-slate-800 text-white px-4 flex items-center justify-center rounded-xl active:scale-95 transition-all">
                📂 <input type="file" id="fileInput" class="hidden" accept=".xlsx, .xls" />
            </label>
            <div class="flex-1 flex gap-1">
                <input type="text" id="manualInput" placeholder="输入或扫码" class="flex-1 border border-slate-300 rounded-xl px-3 font-bold outline-none focus:border-blue-500" />
                <button onclick="startContinuousScan()" class="bg-blue-600 text-white px-5 rounded-xl font-bold shadow-md active:bg-blue-700">📷 扫码</button>
            </div>
        </div>

        <div class="table-container shadow-2xl">
            <table id="mainTable" class="border-collapse table-fixed w-max">
                <thead id="tHead" class="sticky top-0 bg-slate-100 z-30 shadow-sm border-b"></thead>
                <tbody id="tBody"></tbody>
            </table>
        </div>

        <button onclick="exportData()" class="mt-3 bg-emerald-700 text-white py-4 rounded-xl font-black text-lg shadow-xl active:scale-95 transition-transform">
            💾 导出 EXCEL 结果
        </button>

        <div id="scannerModal" class="fixed inset-0 bg-black z-[999] hidden flex-col">
            <div class="p-6 flex justify-between items-center bg-black/80 text-white">
                <div>
                    <div class="font-bold text-lg">正在扫描中...</div>
                    <div id="scanFeedback" class="text-xs text-blue-400">请对准商品条码</div>
                </div>
                <button onclick="stopScan()" class="bg-red-600 px-8 py-3 rounded-full font-black">退出</button>
            </div>
            <div class="flex-1 relative">
                <video id="videoFeed" class="absolute inset-0 w-full h-full object-cover"></video>
                <div class="absolute inset-0 flex items-center justify-center">
                    <div class="w-72 h-48 border-2 border-white/40 rounded-3xl relative overflow-hidden bg-white/5">
                        <div class="scanner-line"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('SR_V7_DATA')) || [];
        let cols = JSON.parse(localStorage.getItem('SR_V7_COLS')) || [];
        let widths = JSON.parse(localStorage.getItem('SR_V7_WIDTHS')) || {};
        let swapIdx = null;

        const codeReader = new ZXing.BrowserMultiFormatReader();

        function init() {
            if (cols.length) render();
            document.getElementById('fileInput').onchange = loadExcel;
            document.getElementById('manualInput').onkeydown = (e) => e.key === 'Enter' && processCode(e.target.value);
        }

        function render() {
            const head = document.getElementById('tHead');
            const body = document.getElementById('tBody');
            
            head.innerHTML = `<tr>${cols.map((c, i) => `
                <th class="bg-slate-50 ${swapIdx === i ? 'bg-yellow-100' : ''}" style="width: ${widths[c] || 150}px">
                    <div class="flex flex-col gap-1">
                        <span class="truncate text-slate-800 font-black text-sm">${c}</span>
                        <button onclick="prepareSwap(${i})" class="text-[9px] border border-blue-300 text-blue-500 px-1 py-0.5 rounded bg-white font-bold active:bg-blue-600 active:text-white">↔️ 交换</button>
                    </div>
                    <div class="resizer" ontouchstart="startResizing(event, '${c}')"></div>
                </th>`).join('')}</tr>`;

            body.innerHTML = db.map((row, rIdx) => `
                <tr class="even:bg-slate-50/50 transition-colors duration-500" id="row-${rIdx}">
                    ${cols.map(c => `
                        <td class="p-1 border-r border-slate-200">
                            <input type="${c==='实际数量'?'number':'text'}" 
                                id="input-${rIdx}-${c}"
                                value="${row[c]||''}" 
                                class="w-full h-11 px-2 outline-none bg-transparent ${c==='实际数量'?'qty-input':''}"
                                onchange="edit(${rIdx},'${c}',this.value)"
                                ${c==='实际数量'?'inputmode="decimal"':''}/>
                        </td>`).join('')}
                </tr>`).join('');
        }

        function processCode(code, fromScanner = false) {
            const barKey = cols.find(c => c.includes('条') || c.includes('码') || c.includes('COD')) || cols[0];
            const idx = db.findIndex(r => String(r[barKey]).trim() === String(code).trim());
            
            if (idx !== -1) {
                // 1. 自动增加数量
                db[idx]['实际数量'] = (parseFloat(db[idx]['实际数量']) || 0) + 1;
                save(); render();
                
                // 2. 只有从主界面输入时才执行自动锁定（扫码模式下建议保持相机开启）
                if (!fromScanner) {
                    lockOnRow(idx);
                } else {
                    ding(); // 扫码成功提示
                }
            } else {
                if(!fromScanner) alert("未找到条码: " + code);
            }
            document.getElementById('manualInput').value = '';
        }

        // 核心锁定逻辑：滚动 + 高亮 + 自动聚焦
        function lockOnRow(idx) {
            const row = document.getElementById(`row-${idx}`);
            const input = document.getElementById(`input-${idx}-实际数量`);
            
            if (row && input) {
                // 滚动到正中间
                row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                
                // 整行高亮效果
                row.classList.add('row-active');
                setTimeout(() => row.classList.remove('row-active'), 3000);
                
                // 自动聚焦到输入框并选中内容
                setTimeout(() => {
                    input.focus();
                    input.select();
                }, 500);
            }
        }

        async function startContinuousScan() {
            document.getElementById('scannerModal').style.display = 'flex';
            try {
                codeReader.decodeFromConstraints({ video: { facingMode: "environment", width: { ideal: 1920 } } }, 'videoFeed', (result) => {
                    if (result) {
                        const code = result.getText();
                        processCode(code, true);
                        document.getElementById('scanFeedback').innerText = "扫码录入成功: " + code;
                        
                        // 扫码模式下也执行一次锁定，方便用户直接在相机界面下方看到背景变色（如果弹窗透明度调低的话）
                        // 或者点击退出后，页面已经停留在那一行
                        const idx = db.findIndex(r => String(r[cols.find(c => c.includes('条') || c.includes('码') || c.includes('COD')) || cols[0]]).trim() === String(code).trim());
                        if (idx !== -1) {
                            setTimeout(() => lockOnRow(idx), 300);
                        }
                    }
                });
            } catch (e) { alert("相机权限开启失败"); stopScan(); }
        }

        function stopScan() { codeReader.reset(); document.getElementById('scannerModal').style.display = 'none'; }

        function ding() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.connect(g); g.connect(ctx.destination);
            osc.frequency.value = 1200;
            g.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.05);
            g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
            osc.start(); osc.stop(ctx.currentTime + 0.2);
            if (navigator.vibrate) navigator.vibrate(100);
        }

        function prepareSwap(idx) {
            if (swapIdx === null) { swapIdx = idx; render(); } 
            else { [cols[swapIdx], cols[idx]] = [cols[idx], cols[swapIdx]]; swapIdx = null; save(); render(); }
        }

        function startResizing(e, colName) {
            const startX = e.touches[0].pageX;
            const startW = widths[colName] || 150;
            const onMove = (ev) => {
                widths[colName] = Math.max(70
