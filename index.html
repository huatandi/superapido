<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>SuperRapido V36 - 强化扫码版</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@0.19.1"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; touch-action: pan-x pan-y; font-family: system-ui; }
        .table-container { background: white; border: 2px solid #1e293b; height: 60vh; overflow: auto; border-radius: 12px; position: relative; }
        table { border-collapse: separate; border-spacing: 0; table-layout: fixed; width: max-content; }
        th { position: sticky; top: 0; z-index: 50; background: #0f172a; color: white; border-right: 1px solid #334155; border-bottom: 3px solid #000; padding: 12px; font-size: 13px; text-align: left; }
        .resizer { position: absolute; right: 0; top: 0; height: 100%; width: 15px; cursor: col-resize; z-index: 60; }
        td { border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; padding: 2px; }
        .qty-input { width: 100%; height: 65px; border: 4px solid #2563eb !important; text-align: center; font-size: 2.2rem; font-weight: 900; color: #1e40af; border-radius: 8px; background: #fff; }
        .row-focus { background-color: #fef08a !important; outline: 6px solid #ef4444; outline-offset: -6px; }
        #toast { position: fixed; top: 15%; left: 50%; transform: translateX(-50%); color: white; padding: 20px; border-radius: 20px; z-index: 10000; display: none; font-weight: 900; text-align: center; width: 80%; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        #colModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center; }
        /* 扫码框辅助线 */
        .scan-overlay { position: absolute; inset: 0; border: 2px solid rgba(34,197,94,0.3); box-shadow: inset 0 0 100px rgba(0,0,0,0.5); pointer-events: none; }
        .scan-line { position: absolute; width: 100%; height: 2px; background: #22c55e; top: 50%; animation: scanMove 2s infinite; }
        @keyframes scanMove { 0% { top: 20%; } 100% { top: 80%; } }
    </style>
</head>
<body class="p-2">
    <div id="toast"></div>

    <div id="colModal">
        <div class="bg-white w-11/12 max-h-[85vh] rounded-3xl p-6 overflow-auto border-4 border-slate-900 shadow-2xl">
            <h2 class="text-2xl font-black mb-4 border-b-2 pb-2 text-slate-800">列管理 / Gestión</h2>
            <div id="colList" class="space-y-2 mb-6"></div>
            <div class="flex gap-2 p-3 bg-slate-100 rounded-2xl border-2">
                <input type="text" id="newColName" placeholder="新列名称..." class="flex-1 bg-transparent font-bold outline-none text-lg" />
                <button onclick="addColumn()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">添加</button>
            </div>
            <button onclick="closeColModal()" class="w-full mt-6 bg-slate-900 text-white py-5 rounded-2xl font-black text-xl">完成返回</button>
        </div>
    </div>

    <div class="flex flex-col h-screen">
        <div class="flex justify-between items-center mb-2">
            <h1 class="text-xl font-black text-slate-900">V36 <span class="bg-green-600 text-white text-[10px] px-2 py-0.5 rounded ml-1 font-mono uppercase">Scan Turbo</span></h1>
            <div class="flex gap-2">
                <button onclick="openColModal()" class="bg-slate-700 text-white text-xs px-3 py-2 rounded-full font-bold">列管理</button>
                <button onclick="hardReset()" class="bg-red-600 text-white text-xs px-3 py-2 rounded-full font-bold">清空重置</button>
            </div>
        </div>

        <div class="flex gap-1 mb-3 bg-white p-2 rounded-2xl shadow-lg border-2 border-slate-200">
            <button onclick="startScanning()" class="bg-blue-600 text-white w-14 h-14 flex items-center justify-center rounded-xl active:scale-95 text-2xl">📷</button>
            <div class="flex-1 flex gap-1">
                <input type="text" id="manualInput" placeholder="扫码枪或手动输入..." autofocus
                    class="flex-1 border-4 border-blue-50/50 rounded-xl px-3 font-bold outline-none focus:border-blue-500" />
                <button onclick="handleBarcode(manualInput.value)" class="bg-slate-800 text-white px-4 rounded-xl font-black text-xs">确认</button>
            </div>
            <label class="bg-slate-100 text-slate-500 w-12 h-14 flex items-center justify-center rounded-xl border-2 border-dashed border-slate-300">
                📂<input type="file" id="fileInput" class="hidden" accept=".xlsx, .xls" />
            </label>
        </div>

        <div class="table-container shadow-2xl">
            <table id="mainTable"><thead id="tHead"></thead><tbody id="tBody"></tbody></table>
        </div>

        <button onclick="exportExcel()" class="mt-3 bg-emerald-700 text-white py-5 rounded-2xl font-black text-2xl shadow-xl">💾 保存导出 Excel</button>
    </div>

    <div id="scanUI" class="fixed inset-0 bg-black z-[999] hidden flex-col">
        <div class="p-4 flex justify-between items-center bg-slate-900 text-white border-b border-green-500">
            <span class="font-bold text-green-400 italic font-mono">SCANNING...</span>
            <button onclick="stopScanning()" class="bg-red-600 px-8 py-2 rounded-full font-bold">退出</button>
        </div>
        <div class="relative flex-1 overflow-hidden">
            <video id="v" class="w-full h-full object-cover"></video>
            <div class="scan-overlay"></div>
            <div class="scan-line"></div>
        </div>
    </div>

    <script>
        const VER = "SR36_TURBO_SCAN";
        let db = JSON.parse(localStorage.getItem(VER+'_DATA')) || [];
        let columns = JSON.parse(localStorage.getItem(VER+'_COLS')) || [];
        let widths = JSON.parse(localStorage.getItem(VER+'_W')) || {};

        const zxing = new ZXing.BrowserMultiFormatReader();
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playFeedback(isSuccess) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(isSuccess ? 1200 : 180, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        // 文件导入逻辑
        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const r = new FileReader();
            r.onload = (ev) => {
                try {
                    const data = new Uint8Array(ev.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" });
                    if (json.length) {
                        columns = Object.keys(json[0]);
                        if (!columns.includes('实际数量')) columns.unshift('实际数量');
                        db = json; push(); render();
                        showMsg("✅ 文件加载成功！", false);
                    }
                } catch (err) { showMsg("❌ 导入失败"); }
            };
            r.readAsArrayBuffer(file);
        };

        // 统一业务逻辑处理
        function handleBarcode(code) {
            if(!code) return;
            const target = String(code).trim().toLowerCase();
            manualInput.value = '';
            const idx = db.findIndex(row => Object.values(row).some(v => String(v).trim().toLowerCase() === target));
            if (idx !== -1) {
                playFeedback(true); render();
                const rowEl = document.getElementById(`r-${idx}`);
                const inputEl = document.getElementById(`in-${idx}-实际数量`);
                document.querySelectorAll('tr').forEach(tr => tr.classList.remove('row-focus'));
                if (rowEl) {
                    rowEl.classList.add('row-focus');
                    rowEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    setTimeout(() => { if(inputEl){inputEl.focus(); inputEl.select();} }, 300);
                }
                stopScanning();
            } else { playFeedback(false); showMsg("⚠️ 未找到: " + target); }
        }

        document.getElementById('manualInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') handleBarcode(e.target.value); });

        // --- 核心修复：更强力的扫码调用 ---
        async function startScanning() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('scanUI').style.display = 'flex';

            const constraints = {
                video: {
                    facingMode: "environment",
                    width: { ideal: 1280 },
                    height: { ideal: 720 },
                    frameRate: { ideal: 60 }
                }
            };

            try {
                // 先获取所有视频设备
                const videoDevices = await zxing.listVideoInputDevices();
                // 选定后置摄像头（通常是列表最后一个或带back字样的）
                const backCamera = videoDevices.find(device => device.label.toLowerCase().includes('back')) || videoDevices[0];
                const deviceId = backCamera ? backCamera.deviceId : undefined;

                zxing.decodeFromVideoDevice(deviceId, 'v', (res, err) => {
                    if (res) {
                        console.log("扫码成功:", res.getText());
                        handleBarcode(res.getText());
                    }
                });
            } catch (err) {
                console.error("相机启动错误:", err);
                showMsg("❌ 无法开启摄像头，请检查权限");
            }
        }

        function stopScanning() { zxing.reset(); document.getElementById('scanUI').style.display = 'none'; }

        // 列管理
        function openColModal() { document.getElementById('colModal').style.display = 'flex'; renderColList(); }
        function closeColModal() { document.getElementById('colModal').style.display = 'none'; }
        function renderColList() {
            const list = document.getElementById('colList');
            list.innerHTML = columns.map((c, i) => `
                <div class="flex items-center justify-between bg-slate-50 p-4 rounded-xl border">
                    <span class="font-bold text-slate-800">${c}</span>
                    <div class="flex gap-2">
                        <button onclick="moveCol(${i}, -1)" class="w-10 h-10 bg-white border rounded">⬆️</button>
                        <button onclick="moveCol(${i}, 1)" class="w-10 h-10 bg-white border rounded">⬇️</button>
                        <button onclick="deleteCol('${c}')" class="w-10 h-10 bg-red-50 text-red-500 border border-red-200 rounded font-bold">❌</button>
                    </div>
                </div>`).join('');
        }
        function moveCol(idx, dir) {
            const target = idx + dir;
            if (target >= 0 && target < columns.length) {
                [columns[idx], columns[target]] = [columns[target], columns[idx]];
                renderColList(); push(); render();
            }
        }
        function addColumn() {
            const n = document.getElementById('newColName').value.trim();
            if (n && !columns.includes(n)) {
                columns.push(n); db.forEach(r => r[n] = "");
                document.getElementById('newColName').value = "";
                renderColList(); push(); render();
            }
        }
        function deleteCol(n) { if(confirm(`删除列 ${n}?`)) { columns = columns.filter(c => c !== n); push(); renderColList(); render(); } }

        // 表格渲染与拉伸
        function render() {
            const h = document.getElementById('tHead'); const b = document.getElementById('tBody');
            if (!columns.length) return;
            h.innerHTML = `<tr>${columns.map(c => `<th id="th-${c}" style="width: ${widths[c] || 130}px">${c}<div class="resizer" ontouchstart="initResize(event, '${c}')"></div></th>`).join('')}</tr>`;
            b.innerHTML = db.map((row, rIdx) => `<tr id="r-${rIdx}">${columns.map(c => `<td><input id="in-${rIdx}-${c}" type="${c==='实际数量'?'number':'text'}" value="${row[c]||''}" class="${c==='实际数量'?'qty-input':'p-2 w-full text-[13px] outline-none bg-transparent'}" onchange="saveVal(${rIdx},'${c}',this.value)" /></td>`).join('')}</tr>`).join('');
        }
        function initResize(e, c) {
            const startX = e.touches[0].pageX; const startW = widths[c] || 130;
            const onMove = (ev) => { widths[c] = Math.max(50, startW + (ev.touches[0].pageX - startX)); document.getElementById(`th-${c}`).style.width = widths[c] + 'px'; };
            const onEnd = () => { document.removeEventListener('touchmove', onMove); push(); };
            document.addEventListener('touchmove', onMove, { passive: false });
            document.addEventListener('touchend', onEnd, { once: true });
        }

        function showMsg(txt, isErr=true) {
            const el = document.getElementById('toast'); el.innerText = txt;
            el.style.display = 'block'; el.style.background = isErr ? '#ef4444' : '#10b981';
            setTimeout(() => el.style.display = 'none', 2500);
        }
        function saveVal(r, c, v) { db[r][c] = v; push(); }
        function push() { 
            localStorage.setItem(VER+'_DATA', JSON.stringify(db)); 
            localStorage.setItem(VER+'_COLS', JSON.stringify(columns));
            localStorage.setItem(VER+'_W', JSON.stringify(widths));
        }
        function hardReset() { if(confirm("确定彻底重置？")) { localStorage.clear(); location.reload(); } }
        function exportExcel() {
            const ws = XLSX.utils.json_to_sheet(db, { header: columns });
            const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Inventory");
            XLSX.writeFile(wb, `Stock_${new Date().toLocaleDateString()}.xlsx`);
        }
        if (columns.length) render();
    </script>
</body>
</html>
