<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>飞速盘点 S1.5 - 超速扫码版</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@0.19.1"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            padding: 8px;
        }
        .main-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            max-width: 600px;
            margin: 0 auto;
        }
        .table-container { 
            background: white; 
            border: 1px solid #e2e8f0; 
            height: 50vh; 
            overflow: auto; 
            border-radius: 12px; 
            -webkit-overflow-scrolling: touch;
            touch-action: pan-x pan-y pinch-zoom;
        }
        table { 
            border-collapse: separate; 
            border-spacing: 0; 
            table-layout: fixed; 
            width: max-content;
            min-width: 100%;
        }
        th { 
            position: sticky; 
            top: 0; 
            z-index: 50; 
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white; 
            border-right: 1px solid #334155; 
            border-bottom: 2px solid #3b82f6; 
            padding: 10px; 
            font-size: 12px; 
            text-align: left;
            font-weight: 600;
        }
        .resizer { 
            position: absolute; 
            right: 0; 
            top: 0; 
            height: 100%; 
            width: 20px; 
            cursor: col-resize; 
            z-index: 60;
            background: rgba(255,255,255,0.1);
            touch-action: none;
        }
        td { 
            border-right: 1px solid #e2e8f0; 
            border-bottom: 1px solid #e2e8f0; 
            padding: 2px;
        }
        .qty-input { 
            width: 100%; 
            height: 55px; 
            border: 3px solid #3b82f6 !important; 
            text-align: center; 
            font-size: 1.5rem; 
            font-weight: 900; 
            color: #1e40af; 
            border-radius: 10px; 
            background: #f0f9ff; 
            transition: all 0.2s;
        }
        .qty-input:focus {
            background: #fef9c3;
            transform: scale(1.01);
            border-color: #ef4444 !important;
            outline: none;
        }
        .row-focus { 
            background: linear-gradient(90deg, #fef08a 0%, #fde047 100%) !important;
            animation: highlight 0.3s ease;
            box-shadow: 0 0 0 3px #ef4444 inset;
        }
        @keyframes highlight {
            0%, 100% { background: linear-gradient(90deg, #fef08a 0%, #fde047 100%); }
            50% { background: linear-gradient(90deg, #fde047 0%, #fef08a 100%); }
        }
        #toast { 
            position: fixed; 
            top: 20%; 
            left: 50%; 
            transform: translateX(-50%); 
            background: #1f2937;
            color: white; 
            padding: 10px 20px; 
            border-radius: 40px; 
            z-index: 10000; 
            display: none; 
            font-weight: bold; 
            text-align: center; 
            white-space: nowrap;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            pointer-events: none;
            font-size: 14px;
            backdrop-filter: blur(10px);
        }
        #colModal { 
            display:none; 
            position:fixed; 
            inset:0; 
            background:rgba(0,0,0,0.9); 
            z-index:9999; 
            align-items:center; 
            justify-content:center;
            backdrop-filter: blur(8px);
        }
        .modal-content {
            background: white;
            border-radius: 24px;
            max-width: 90%;
            width: 350px;
            max-height: 70vh;
            overflow: auto;
        }
        .scan-frame { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 85%; 
            height: 250px; 
            border: 3px solid #3b82f6; 
            border-radius: 20px; 
            box-shadow: 0 0 0 2000px rgba(0,0,0,0.75); 
            z-index: 10; 
            pointer-events: none; 
            background: rgba(0,0,0,0.1);
        }
        .scan-line { 
            position: absolute; 
            width: 100%; 
            height: 4px; 
            background: linear-gradient(90deg, transparent, #3b82f6, #60a5fa, #3b82f6, transparent);
            top: 0; 
            animation: scanLineMove 1.2s infinite ease-in-out; 
            box-shadow: 0 0 20px #3b82f6;
        }
        @keyframes scanLineMove { 
            0%, 100% { top: 5%; }
            50% { top: 95%; }
        }
        .btn-icon {
            transition: transform 0.1s ease;
            font-size: 13px;
            font-weight: bold;
            white-space: nowrap;
        }
        .btn-icon:active {
            transform: scale(0.95);
        }
        .col-item {
            background: white;
            margin-bottom: 8px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
            cursor: move;
            touch-action: none;
        }
        .col-item.dragging {
            opacity: 0.4;
            transform: scale(0.98);
            background: #dbeafe;
        }
        .version-badge {
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 16px;
            font-size: 10px;
            font-weight: bold;
        }
        .btn-group {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }
        .action-btn {
            padding: 10px 4px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 12px;
            text-align: center;
            transition: all 0.1s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .close-scan-btn {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.5);
            font-size: 18px;
            font-weight: 900;
            padding: 12px 24px;
            border-radius: 50px;
            border: 2px solid white;
        }
        .close-scan-btn:active {
            transform: scale(0.95);
        }
        .scan-header {
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            border-bottom: 3px solid #3b82f6;
        }
        /* 扫码成功动画 */
        .scan-success {
            animation: flash 0.2s ease;
        }
        @keyframes flash {
            0%, 100% { border-color: #3b82f6; }
            50% { border-color: #10b981; box-shadow: 0 0 0 2000px rgba(16,185,129,0.3); }
        }
        @media (max-width: 480px) {
            .action-btn {
                font-size: 10px;
                padding: 8px 2px;
            }
            .qty-input { height: 48px; font-size: 1.2rem; }
            .main-card { border-radius: 16px; }
            body { padding: 6px; }
            .close-scan-btn {
                font-size: 14px;
                padding: 8px 20px;
            }
        }
    </style>
</head>
<body>
    <div id="toast"></div>

    <div id="colModal">
        <div class="modal-content p-5">
            <h2 class="text-xl font-bold mb-3 text-center">📋 列管理</h2>
            <p class="text-xs text-gray-500 text-center mb-3">💡 拖动排序 | 点击按钮删除</p>
            <div id="colList" class="space-y-2 mb-4 max-h-80 overflow-auto"></div>
            <div class="flex gap-2 p-2 bg-gray-100 rounded-lg">
                <input type="text" id="newColName" placeholder="新列名..." class="flex-1 bg-white rounded-lg px-3 py-2 font-bold text-sm outline-none" />
                <button onclick="addColumn()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold text-sm">添加</button>
            </div>
            <button onclick="closeColModal()" class="w-full mt-4 bg-gray-900 text-white py-3 rounded-xl font-bold text-base">完成</button>
        </div>
    </div>

    <div class="main-card">
        <div class="bg-gradient-to-r from-blue-600 to-purple-600 p-3 text-white">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-2xl font-black tracking-tight">🚀 飞速盘点</h1>
                    <div class="version-badge inline-block mt-0.5">S1.5</div>
                </div>
                <div class="text-right text-xs opacity-90">
                    超速扫码
                </div>
            </div>
        </div>

        <div class="p-3">
            <div class="flex gap-2 mb-3">
                <button id="scanBtn" class="bg-blue-600 text-white rounded-xl active:scale-95 flex items-center justify-center" style="width: 70px; height: 70px; font-size: 32px;">
                    📷
                </button>
                <div class="flex-1">
                    <input type="text" id="manualInput" placeholder="📱 输入条码/编码/名称..." 
                        class="w-full border-2 border-gray-300 rounded-xl px-3 py-2 font-bold text-base focus:border-blue-500 outline-none" />
                </div>
            </div>
            
            <div class="btn-group mb-3">
                <button id="confirmBtn" class="action-btn bg-blue-600 text-white shadow-md">
                    ✅ 确认
                </button>
                <button onclick="openColModal()" class="action-btn bg-gray-700 text-white shadow-md">
                    📊 列管理
                </button>
                <button onclick="hardReset()" class="action-btn bg-red-600 text-white shadow-md">
                    🗑️ 重置
                </button>
                <label class="action-btn bg-emerald-600 text-white shadow-md cursor-pointer">
                    📂 导入 <input type="file" id="fileInput" class="hidden" accept=".xlsx, .xls" />
                </label>
            </div>

            <div class="table-container" id="tableContainer">
                <table id="mainTable" style="touch-action: pan-x pan-y pinch-zoom;">
                    <thead id="tHead"></thead>
                    <tbody id="tBody"></tbody>
                </table>
            </div>
            
            <button onclick="exportExcel()" class="mt-3 w-full bg-emerald-600 text-white py-3 rounded-xl font-bold text-base shadow-lg active:scale-95 transition">
                💾 导出 Excel
            </button>
        </div>
    </div>

    <div id="scanUI" class="fixed inset-0 bg-black z-[999] hidden flex-col">
        <div class="scan-header p-4 flex justify-between items-center">
            <span class="font-bold text-blue-400 text-lg">🔍 超速扫描模式</span>
            <button onclick="stopScanning()" class="close-scan-btn text-white font-bold">
                ✕ 关闭
            </button>
        </div>
        <div class="relative flex-1 bg-black">
            <video id="video" class="w-full h-full object-cover" playsinline muted autoplay></video>
            <div class="scan-frame" id="scanFrame">
                <div class="scan-line"></div>
            </div>
            <div class="absolute bottom-8 left-0 right-0 text-center">
                <div class="bg-black/70 backdrop-blur text-white px-4 py-2 rounded-full inline-block text-sm font-bold border-2 border-blue-500">
                    📷 倾斜、反光都能识别 | 自动连续扫描
                </div>
            </div>
        </div>
    </div>

    <script>
        const VERSION = "S1.5";
        const STORAGE_KEY = "FEISUPANDIAN_" + VERSION;
        
        let db = [];
        let columns = [];
        let widths = {};
        let scanning = false;
        let reader = null;
        let lastCode = "";
        let lastTime = 0;
        let jumpTimeout = null;

        // 加载数据
        function loadData() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const data = JSON.parse(saved);
                    db = data.db || [];
                    columns = data.columns || [];
                    widths = data.widths || {};
                }
                if (!columns.length) {
                    columns = ['实际数量', '商品名称', '编码', '价格'];
                    db = [];
                }
                if (!db.length) {
                    db = [];
                }
                db.forEach(row => {
                    if (row['实际数量'] === undefined) row['实际数量'] = '';
                });
            } catch(e) {
                console.error(e);
                columns = ['实际数量', '商品名称', '编码', '价格'];
                db = [];
            }
        }

        function saveData() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({
                    db: db,
                    columns: columns,
                    widths: widths,
                    version: VERSION
                }));
            } catch(e) {
                showToast("存储空间不足", true);
            }
        }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.background = isError ? '#dc2626' : '#10b981';
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 2000);
        }

        function playBeep(success) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.value = success ? 1200 : 400;
                gainNode.gain.value = 0.15;
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.15);
                oscillator.stop(audioCtx.currentTime + 0.15);
                audioCtx.resume();
            } catch(e) {}
        }

        function vibrate() {
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(30);
            }
        }

        // 立即跳转到指定行并聚焦（无延迟）
        function jumpToRowAndFocus(foundIndex) {
            // 清除之前的跳转定时器
            if (jumpTimeout) clearTimeout(jumpTimeout);
            
            // 立即重新渲染（确保DOM最新）
            render();
            
            // 使用 requestAnimationFrame 确保 DOM 更新完成
            requestAnimationFrame(() => {
                const rowEl = document.getElementById(`row-${foundIndex}`);
                if (rowEl) {
                    // 移除所有高亮
                    document.querySelectorAll('#mainTable tbody tr').forEach(tr => {
                        tr.classList.remove('row-focus');
                    });
                    
                    // 添加高亮
                    rowEl.classList.add('row-focus');
                    
                    // 立即滚动
                    rowEl.scrollIntoView({ 
                        behavior: 'auto',  // 使用 auto 而不是 smooth，更快
                        block: 'center',
                        inline: 'center'
                    });
                    
                    // 立即聚焦数量输入框
                    const qtyInput = document.getElementById(`qty-${foundIndex}`);
                    if (qtyInput) {
                        qtyInput.focus();
                        qtyInput.select();
                        // 添加视觉反馈
                        qtyInput.style.transform = 'scale(1.02)';
                        qtyInput.style.borderColor = '#10b981';
                        setTimeout(() => {
                            if (qtyInput) {
                                qtyInput.style.transform = '';
                                qtyInput.style.borderColor = '';
                            }
                        }, 200);
                    }
                }
            });
        }

        // 超快速条码识别（优化匹配算法）
        function handleBarcode(code, fromCamera = false) {
            if (!code) return false;
            
            const now = Date.now();
            const codeStr = String(code).trim();
            
            // 更短的防重复时间（200ms）
            if (codeStr === lastCode && (now - lastTime) < 200) {
                return false;
            }
            lastCode = codeStr;
            lastTime = now;
            
            // 显示识别到的内容
            showToast(`识别: ${codeStr.substring(0, 25)}`, false);
            
            // 快速查找 - 优化算法
            let foundIndex = -1;
            const codeLower = codeStr.toLowerCase();
            
            // 单次遍历，提前退出
            for (let i = 0; i < db.length; i++) {
                const row = db[i];
                // 检查所有字段
                for (let key in row) {
                    const val = String(row[key] || '').trim();
                    if (val === codeStr) {
                        foundIndex = i;
                        break;
                    }
                }
                if (foundIndex !== -1) break;
                
                // 包含匹配（仅限文本字段）
                for (let key in row) {
                    const val = String(row[key] || '').trim().toLowerCase();
                    if (val && val.includes(codeLower) && 
                        (key === '商品名称' || key === '名称' || key === '编码' || key === '条码' || key === '商品编码')) {
                        foundIndex = i;
                        break;
                    }
                }
                if (foundIndex !== -1) break;
            }
            
            if (foundIndex !== -1) {
                // 成功反馈
                playBeep(true);
                vibrate();
                
                const productName = db[foundIndex]['商品名称'] || db[foundIndex]['名称'] || codeStr;
                showToast(`✅ ${productName}`, false);
                
                // 添加扫描框闪烁效果
                const scanFrame = document.getElementById('scanFrame');
                if (scanFrame) {
                    scanFrame.classList.add('scan-success');
                    setTimeout(() => scanFrame.classList.remove('scan-success'), 200);
                }
                
                // 立即跳转（关键修复）
                jumpToRowAndFocus(foundIndex);
                
                return true;
            } else {
                playBeep(false);
                showToast(`❌ 未找到: ${codeStr.substring(0, 20)}`, true);
                return false;
            }
        }

        // 启动超速扫描
        async function startScanning() {
            if (scanning) {
                showToast("扫描器已在运行", false);
                return;
            }
            
            const scanUI = document.getElementById('scanUI');
            scanUI.style.display = 'flex';
            scanning = true;
            
            if (reader) {
                try {
                    await reader.reset();
                } catch(e) {}
                reader = null;
            }
            
            try {
                // 优化摄像头配置 - 提高识别率
                const constraints = {
                    video: {
                        facingMode: { exact: "environment" },
                        width: { ideal: 1920, min: 1280 },
                        height: { ideal: 1080, min: 720 },
                        frameRate: { ideal: 60, min: 30 }
                    }
                };
                
                // 创建更强大的解码器
                const hints = new Map();
                hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
                hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
                    ZXing.BarcodeFormat.QR_CODE,
                    ZXing.BarcodeFormat.EAN_13,
                    ZXing.BarcodeFormat.EAN_8,
                    ZXing.BarcodeFormat.UPC_A,
                    ZXing.BarcodeFormat.UPC_E,
                    ZXing.BarcodeFormat.CODE_39,
                    ZXing.BarcodeFormat.CODE_93,
                    ZXing.BarcodeFormat.CODE_128,
                    ZXing.BarcodeFormat.ITF,
                    ZXing.BarcodeFormat.CODABAR
                ]);
                
                reader = new ZXing.BrowserMultiFormatReader(hints);
                // 极速解码 - 50ms 间隔
                reader.timeBetweenDecodingAttempts = 50;
                
                await reader.decodeFromConstraints(constraints, 'video', (result, error) => {
                    if (result && scanning) {
                        const code = result.getText();
                        if (code) {
                            handleBarcode(code, true);
                        }
                    }
                });
                
                showToast("超速扫描已启动 | 支持倾斜/反光识别", false);
                
                // 增强对焦和曝光控制
                const videoEl = document.getElementById('video');
                const focusInterval = setInterval(() => {
                    if (!scanning) {
                        clearInterval(focusInterval);
                        return;
                    }
                    if (videoEl && videoEl.srcObject) {
                        const track = videoEl.srcObject.getVideoTracks()[0];
                        if (track && track.getCapabilities) {
                            const caps = track.getCapabilities();
                            // 启用连续对焦
                            if (caps.focusMode && caps.focusMode.includes('continuous')) {
                                track.applyConstraints({
                                    advanced: [{ focusMode: 'continuous' }]
                                }).catch(() => {});
                            }
                            // 启用曝光补偿（如果支持）
                            if (caps.exposureCompensation) {
                                track.applyConstraints({
                                    advanced: [{ exposureCompensation: 0 }]
                                }).catch(() => {});
                            }
                        }
                    }
                }, 1000);
                
                window.currentFocusInterval = focusInterval;
                
            } catch(err) {
                console.error("相机错误:", err);
                showToast("无法启动摄像头，请检查权限", true);
                stopScanning();
            }
        }

        function stopScanning() {
            scanning = false;
            
            if (window.currentFocusInterval) {
                clearInterval(window.currentFocusInterval);
                window.currentFocusInterval = null;
            }
            
            if (reader) {
                try {
                    reader.reset();
                } catch(e) {}
                reader = null;
            }
            
            const videoEl = document.getElementById('video');
            if (videoEl && videoEl.srcObject) {
                const tracks = videoEl.srcObject.getTracks();
                tracks.forEach(track => track.stop());
                videoEl.srcObject = null;
            }
            
            const scanUI = document.getElementById('scanUI');
            scanUI.style.display = 'none';
        }

        function render() {
            const thead = document.getElementById('tHead');
            const tbody = document.getElementById('tBody');
            
            if (!columns.length) {
                tbody.innerHTML = '<tr><td colspan="10" class="text-center p-6 text-gray-500">暂无数据，请导入Excel或添加列表</td></tr>';
                return;
            }
            
            thead.innerHTML = `<tr>${columns.map(col => `
                <th style="width: ${widths[col] || 130}px; position: relative;">
                    ${col}
                    <div class="resizer" 
                         ontouchstart="startResize(event, '${col}')"
                         ontouchmove="onResize(event, '${col}')"
                         ontouchend="endResize(event, '${col}')"></div>
                </th>
            `).join('')}</tr>`;
            
            tbody.innerHTML = db.map((row, idx) => `
                <tr id="row-${idx}">
                    ${columns.map(col => `
                        <td>
                            ${col === '实际数量' ? 
                                `<input id="qty-${idx}" type="number" value="${row[col] || ''}" 
                                    class="qty-input" 
                                    onchange="updateQty(${idx}, this.value)"
                                    onfocus="this.select()"
                                    placeholder="0"
                                    inputmode="numeric" />` :
                                `<input type="text" value="${escapeHtml(String(row[col] || ''))}" 
                                    class="w-full p-2 text-xs outline-none bg-transparent"
                                    onchange="updateCell(${idx}, '${col}', this.value)" />`
                            }
                        </td>
                    `).join('')}
                </tr>
            `).join('');
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function updateQty(rowIndex, value) {
            db[rowIndex]['实际数量'] = value;
            saveData();
            showToast("已保存", false);
        }
        
        function updateCell(rowIndex, col, value) {
            db[rowIndex][col] = value;
            saveData();
        }
        
        let resizeInfo = null;
        function startResize(e, col) {
            e.preventDefault();
            const startX = e.touches[0].pageX;
            resizeInfo = { col, startX, startWidth: widths[col] || 130 };
        }
        
        function onResize(e, col) {
            if (!resizeInfo || resizeInfo.col !== col) return;
            e.preventDefault();
            const delta = e.touches[0].pageX - resizeInfo.startX;
            const newWidth = Math.max(60, resizeInfo.startWidth + delta);
            widths[col] = newWidth;
            render();
        }
        
        function endResize(e, col) {
            if (resizeInfo) {
                saveData();
                resizeInfo = null;
            }
        }
        
        function renderColList() {
            const container = document.getElementById('colList');
            container.innerHTML = columns.map((col, idx) => `
                <div class="col-item p-3" draggable="true" data-index="${idx}" data-col="${col}">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-2 flex-1">
                            <span class="drag-handle text-xl cursor-move">☰</span>
                            <span class="font-bold text-sm">${idx + 1}. ${col}</span>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="moveColumnUp(${idx})" class="bg-blue-500 text-white px-2 py-1 rounded text-xs">
                                ⬆️
                            </button>
                            <button onclick="moveColumnDown(${idx})" class="bg-blue-500 text-white px-2 py-1 rounded text-xs">
                                ⬇️
                            </button>
                            <button onclick="deleteColumn('${col}')" class="bg-red-500 text-white px-2 py-1 rounded text-xs">
                                删
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
            
            setupDragAndDrop();
        }
        
        function setupDragAndDrop() {
            const items = document.querySelectorAll('.col-item');
            let draggedItem = null;
            
            items.forEach(item => {
                item.setAttribute('draggable', 'true');
                
                item.addEventListener('dragstart', (e) => {
                    draggedItem = item;
                    item.style.opacity = '0.5';
                    e.dataTransfer.effectAllowed = 'move';
                });
                
                item.addEventListener('dragend', (e) => {
                    item.style.opacity = '';
                    draggedItem = null;
                });
                
                item.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                });
                
                item.addEventListener('drop', (e) => {
                    e.preventDefault();
                    if (!draggedItem || draggedItem === item) return;
                    
                    const fromIndex = parseInt(draggedItem.getAttribute('data-index'));
                    const toIndex = parseInt(item.getAttribute('data-index'));
                    
                    if (!isNaN(fromIndex) && !isNaN(toIndex)) {
                        const temp = columns[fromIndex];
                        columns[fromIndex] = columns[toIndex];
                        columns[toIndex] = temp;
                        renderColList();
                        render();
                        saveData();
                        showToast("列顺序已更新", false);
                    }
                });
            });
        }
        
        function moveColumnUp(index) {
            if (index > 0) {
                const temp = columns[index];
                columns[index] = columns[index - 1];
                columns[index - 1] = temp;
                renderColList();
                render();
                saveData();
                showToast("列顺序已更新", false);
            }
        }
        
        function moveColumnDown(index) {
            if (index < columns.length - 1) {
                const temp = columns[index];
                columns[index] = columns[index + 1];
                columns[index + 1] = temp;
                renderColList();
                render();
                saveData();
                showToast("列顺序已更新", false);
            }
        }
        
        function openColModal() {
            renderColList();
            document.getElementById('colModal').style.display = 'flex';
        }
        
        function closeColModal() {
            document.getElementById('colModal').style.display = 'none';
            render();
        }
        
        function addColumn() {
            const newCol = document.getElementById('newColName').value.trim();
            if (newCol && !columns.includes(newCol)) {
                columns.push(newCol);
                db.forEach(row => row[newCol] = '');
                renderColList();
                render();
                saveData();
                showToast(`已添加列: ${newCol}`, false);
                document.getElementById('newColName').value = '';
            } else if (columns.includes(newCol)) {
                showToast("列名已存在", true);
            }
        }
        
        function deleteColumn(colName) {
            if (confirm(`确定删除列 "${colName}" 吗？数据将丢失！`)) {
                const index = columns.indexOf(colName);
                if (index !== -1) {
                    columns.splice(index, 1);
                    db.forEach(row => delete row[colName]);
                    renderColList();
                    render();
                    saveData();
                    showToast(`已删除列: ${colName}`, false);
                }
            }
        }
        
        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            showToast("正在导入...", false);
            const fileReader = new FileReader();
            fileReader.onload = (ev) => {
                try {
                    const data = new Uint8Array(ev.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(sheet, { defval: "" });
                    
                    if (json.length > 0) {
                        columns = Object.keys(json[0]);
                        if (!columns.includes('实际数量')) {
                            columns.unshift('实际数量');
                        }
                        db = json.map(row => {
                            const newRow = { ...row };
                            if (newRow['实际数量'] === undefined) newRow['实际数量'] = '';
                            return newRow;
                        });
                        saveData();
                        render();
                        showToast(`✅ 导入成功！共 ${db.length} 条数据`, false);
                    } else {
                        showToast("文件无数据", true);
                    }
                } catch(err) {
                    showToast("解析失败", true);
                }
            };
            fileReader.readAsArrayBuffer(file);
            e.target.value = '';
        };
        
        function exportExcel() {
            if (!db.length) {
                showToast("暂无数据可导出", true);
                return;
            }
            const ws = XLSX.utils.json_to_sheet(db, { header: columns });
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "库存数据");
            const fileName = `飞速盘点_${new Date().toLocaleDateString()}.xlsx`;
            XLSX.writeFile(wb, fileName);
            showToast("✅ 导出成功", false);
        }
        
        function hardReset() {
            if (confirm("⚠️ 确定清空所有数据吗？此操作不可恢复！")) {
                localStorage.removeItem(STORAGE_KEY);
                db = [];
                columns = ['实际数量', '商品名称', '编码', '价格'];
                widths = {};
                saveData();
                render();
                showToast("已清空所有数据", false);
            }
        }
        
        window.addEventListener('beforeunload', () => {
            if (scanning) {
                stopScanning();
            }
        });
        
        loadData();
        render();
        
        document.getElementById('confirmBtn').onclick = () => {
            const input = document.getElementById('manualInput');
            if (input.value.trim()) {
                handleBarcode(input.value, false);
                input.value = '';
            }
        };
        
        document.getElementById('manualInput').onkeypress = (e) => {
            if (e.key === 'Enter') {
                const input = e.target;
                if (input.value.trim()) {
                    handleBarcode(input.value, false);
                    input.value = '';
                }
            }
        };
        
        document.getElementById('scanBtn').onclick = () => {
            if (scanning) {
                stopScanning();
            } else {
                startScanning();
            }
        };
        
        console.log(`🚀 飞速盘点 ${VERSION} 已启动 | 超速扫码引擎 | 支持倾斜/反光识别`);
    </script>
</body>
</html>
