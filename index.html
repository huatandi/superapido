<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>SuperRapido V40.3 - 极速兼容版</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@0.19.1"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: system-ui; }
        .table-container { background: white; border: 2px solid #1e293b; height: 60vh; overflow: auto; border-radius: 12px; }
        table { border-collapse: separate; border-spacing: 0; table-layout: fixed; width: max-content; }
        th { position: sticky; top: 0; z-index: 50; background: #0f172a; color: white; padding: 12px; font-size: 13px; text-align: left; }
        td { border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; padding: 2px; }
        .qty-input { width: 100%; height: 65px; border: 4px solid #2563eb !important; text-align: center; font-size: 2.2rem; font-weight: 900; color: #1e40af; border-radius: 8px; }
        .row-focus { background-color: #fef08a !important; outline: 6px solid #ef4444; outline-offset: -6px; }
        #toast { position: fixed; top: 15%; left: 50%; transform: translateX(-50%); color: white; padding: 20px; border-radius: 20px; z-index: 10000; display: none; font-weight: 900; text-align: center; width: 80%; }
        .scan-frame { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); width: 280px; height: 160px; border: 4px solid #3b82f6; border-radius: 20px; box-shadow: 0 0 0 2000px rgba(0,0,0,0.7); z-index: 10; pointer-events: none; }
    </style>
</head>
<body class="p-2">
    <div id="toast"></div>

    <div class="flex flex-col h-screen">
        <div class="flex justify-between items-center mb-2">
            <h1 class="text-xl font-black text-slate-900">V40.3 <span class="bg-blue-700 text-white text-[10px] px-2 py-0.5 rounded ml-1 uppercase">iOS Fix</span></h1>
            <button onclick="if(confirm('重置？')){localStorage.clear();location.reload();}" class="bg-red-600 text-white text-xs px-3 py-2 rounded-full font-bold">重置</button>
        </div>

        <div class="flex gap-2 mb-3 bg-white p-2 rounded-2xl shadow-lg border-2 border-slate-200 items-center">
            <button onclick="startScanning()" class="bg-blue-600 text-white w-20 h-20 rounded-2xl flex items-center justify-center text-4xl shadow-xl shrink-0">📷</button>
            <div class="flex-1 flex flex-col gap-1">
                <input type="text" id="manualInput" placeholder="条码..." class="flex-1 border-4 border-blue-100 rounded-xl px-3 h-12 font-bold outline-none focus:border-blue-600" />
                <label class="bg-slate-100 text-slate-500 h-8 flex items-center justify-center rounded-lg border-2 border-dashed border-slate-300 text-xs font-bold cursor-pointer">
                    📂 导入 EXCEL <input type="file" id="fileInput" class="hidden" accept=".xlsx, .xls" />
                </label>
            </div>
        </div>

        <div class="table-container shadow-2xl">
            <table id="mainTable"><thead id="tHead"></thead><tbody id="tBody"></tbody></table>
        </div>
        <button onclick="exportExcel()" class="mt-3 bg-emerald-700 text-white py-5 rounded-2xl font-black text-2xl">💾 保存导出 Excel</button>
    </div>

    <div id="scanUI" class="fixed inset-0 bg-black z-[999] hidden flex-col">
        <div class="p-4 flex justify-between items-center bg-slate-900 text-white">
            <span class="font-bold">扫码中...</span>
            <button onclick="stopScanning()" class="bg-red-600 px-8 py-2 rounded-full font-bold">关闭</button>
        </div>
        <div class="relative flex-1 overflow-hidden">
            <video id="v" class="w-full h-full object-cover" playsinline webkit-playsinline muted autoplay></video>
            <div class="scan-frame"></div>
        </div>
    </div>

    <script>
        const VER = "SR40_STABLE";
        let db = JSON.parse(localStorage.getItem(VER+'_DATA')) || [];
        let columns = JSON.parse(localStorage.getItem(VER+'_COLS')) || [];
        
        const hints = new Map();
        hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.CODE_128, ZXing.BarcodeFormat.UPC_A]);
        hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
        const zxing = new ZXing.BrowserMultiFormatReader(hints);

        // 导入
        document.getElementById('fileInput').onchange = (e) => {
            const f = e.target.files[0]; if(!f) return;
            const fr = new FileReader();
            fr.onload = (ev) => {
                const d = new Uint8Array(ev.target.result);
                const w = XLSX.read(d, {type:'array'});
                const j = XLSX.utils.sheet_to_json(w.Sheets[w.SheetNames[0]], {defval:""});
                if(j.length){ columns = Object.keys(j[0]); if(!columns.includes('实际数量')) columns.unshift('实际数量'); db = j; push(); render(); }
            };
            fr.readAsArrayBuffer(f);
        };

        async function startScanning() {
            document.getElementById('scanUI').style.display = 'flex';
            const videoEl = document.getElementById('v');
            try {
                // 强制请求后置摄像头，并使用 iPhone 兼容的约束
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", focusMode: "continuous" } 
                });
                videoEl.srcObject = stream;
                
                // 核心修复：确保视频开始播放后才挂载识别程序
                videoEl.onloadedmetadata = () => {
                    videoEl.play().then(() => {
                        zxing.decodeFromStream(stream, 'v', (res) => {
                            if(res) { handleBarcode(res.getText()); stopScanning(); }
                        });
                    });
                };
            } catch (err) { alert("iPhone 请使用 Safari 打开并允许摄像头权限"); stopScanning(); }
        }

        function stopScanning() {
            zxing.reset();
            const v = document.getElementById('v');
            if(v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
            document.getElementById('scanUI').style.display = 'none';
        }

        function handleBarcode(code) {
            if(!code) return;
            const t = String(code).trim().toLowerCase();
            const idx = db.findIndex(r => Object.values(r).some(v => String(v).trim().toLowerCase() === t));
            if(idx !== -1) {
                render();
                const row = document.getElementById(`r-${idx}`);
                const inp = document.getElementById(`in-${idx}-实际数量`);
                document.querySelectorAll('tr').forEach(tr => tr.classList.remove('row-focus'));
                row.classList.add('row-focus');
                row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                setTimeout(() => { if(inp){inp.focus(); inp.select();} }, 300);
            } else { showMsg("⚠️ 未找到: " + t); }
        }

        function render() {
            if(!columns.length) return;
            document.getElementById('tHead').innerHTML = `<tr>${columns.map(c => `<th>${c}</th>`).join('')}</tr>`;
            document.getElementById('tBody').innerHTML = db.map((r, i) => `<tr id="r-${i}">${columns.map(c => `<td><input id="in-${i}-${c}" type="${c==='实际数量'?'number':'text'}" value="${r[c]||''}" class="${c==='实际数量'?'qty-input':'p-2 w-full text-xs outline-none'}" onchange="db[${i}]['${c}']=this.value;push();" /></td>`).join('')}</tr>`).join('');
        }
        function push() { localStorage.setItem(VER+'_DATA', JSON.stringify(db)); localStorage.setItem(VER+'_COLS', JSON.stringify(columns)); }
        function showMsg(t) { const e = document.getElementById('toast'); e.innerText = t; e.style.display = 'block'; e.style.background = '#ef4444'; setTimeout(() => e.style.display='none', 2000); }
        function exportExcel() { const ws = XLSX.utils.json_to_sheet(db, {header:columns}); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Inv"); XLSX.writeFile(wb, `Stock.xlsx`); }
        if(columns.length) render();
        manualInput.onkeydown = (e) => { if(e.key === 'Enter') handleBarcode(e.target.value); };
    </script>
</body>
</html>
