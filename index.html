<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>SuperRapido V10 - 增强交互版</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; overflow-x: hidden; }
        /* 表格容器：允许横向纵向滚动 */
        .table-box { background: white; border: 2px solid #94a3b8; height: 75vh; overflow: auto; border-radius: 8px; position: relative; }
        table { border-collapse: separate; border-spacing: 0; table-layout: fixed; width: max-content; }
        /* 列头样式：深色分割线 */
        th { 
            position: sticky; top: 0; z-index: 40; background: #e2e8f0; 
            border-right: 2px solid #64748b; border-bottom: 2px solid #64748b; 
            padding: 8px; text-align: left; font-weight: bold;
        }
        /* 单元格样式 */
        td { border-right: 1px solid #cbd5e1; border-bottom: 1px solid #cbd5e1; padding: 0; }
        /* 拖拽把手 */
        .resizer { 
            position: absolute; right: 0; top: 0; width: 15px; height: 100%; 
            cursor: col-resize; touch-action: none; z-index: 50;
        }
        .resizer:active { background: rgba(59, 130, 246, 0.5); }
        /* 输入框 */
        .qty-input { width: 100%; height: 50px; border: none; background: #eff6ff; font-weight: 900; text-align: center; font-size: 1.4rem; color: #1e40af; }
        .text-input { width: 100%; height: 40px; border: none; padding: 0 8px; background: transparent; outline: none; }
        .row-blink { background-color: #fef08a !important; transition: background 0.3s; }
    </style>
</head>
<body class="p-2">
    <div class="flex flex-col h-screen">
        <div class="flex justify-between items-center mb-2">
            <h1 class="text-xl font-black text-blue-900">SuperRapido V10</h1>
            <button onclick="hardReset()" class="text-[10px] bg-red-500 text-white px-2 py-1 rounded shadow">清除数据</button>
        </div>

        <div class="flex gap-2 mb-3 bg-white p-2 rounded-xl shadow border">
            <label class="bg-slate-800 text-white w-14 h-14 flex items-center justify-center rounded-xl active:scale-95">
                📂 <input type="file" id="fileInput" class="hidden" accept=".xlsx, .xls" />
            </label>
            <div class="flex-1 flex gap-1">
                <input type="text" id="manualInput" placeholder="输入条码..." class="flex-1 border-2 rounded-xl px-3 font-bold" />
                <button onclick="startScan()" class="bg-blue-600 text-white px-4 rounded-xl font-bold">📷 扫码</button>
            </div>
        </div>

        <div class="table-box" id="scrollContainer">
            <table id="mainTable">
                <thead id="tHead"></thead>
                <tbody id="tBody"></tbody>
            </table>
        </div>

        <button onclick="exportExcel()" class="mt-3 bg-emerald-700 text-white py-4 rounded-xl font-black text-lg shadow-xl">
            💾 保存导出盘点表
        </button>
    </div>

    <div id="scanWin" class="fixed inset-0 bg-black z-[1000] hidden flex-col">
        <div class="p-4 flex justify-between bg-black/50 text-white">
            <span class="font-bold">连扫模式...</span>
            <button onclick="stopScan()" class="bg-red-600 px-6 py-2 rounded-full">退出</button>
        </div>
        <video id="video" class="flex-1 object-cover"></video>
    </div>

    <script>
        let inventory = JSON.parse(localStorage.getItem('SR10_DATA')) || [];
        let columns = JSON.parse(localStorage.getItem('SR10_COLS')) || [];
        let colWidths = JSON.parse(localStorage.getItem('SR10_WIDTHS')) || {};
        const reader = new ZXing.BrowserMultiFormatReader();

        function renderTable() {
            const thead = document.getElementById('tHead');
            const tbody = document.getElementById('tBody');
            if (!columns.length) return;

            // 渲染表头
            thead.innerHTML = `<tr>${columns.map(col => `
                <th style="width: ${colWidths[col] || 150}px" id="th-${col}">
                    <div class="flex flex-col gap-1 overflow-hidden">
                        <span class="truncate">${col}</span>
                        <button onclick="swapMode('${col}')" class="text-[10px] w-fit bg-white border border-blue-400 text-blue-600 px-1 rounded">↔️ 交换</button>
                    </div>
                    <div class="resizer" ontouchstart="initResize(event, '${col}')"></div>
                </th>`).join('')}</tr>`;

            // 渲染数据
            tbody.innerHTML = inventory.map((row, rIdx) => `
                <tr id="row-${rIdx}">
                    ${columns.map(col => `
                        <td>
                            <input type="${col==='实际数量'?'number':'text'}" 
                                value="${row[col]||''}" 
                                class="${col==='实际数量'?'qty-input':'text-input'}" 
                                onchange="updateVal(${rIdx}, '${col}', this.value)" />
                        </td>`).join('')}
                </tr>`).join('');
        }

        // 文件读取
        document.getElementById('fileInput').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const wb = XLSX.read(ev.target.result, { type: 'array' });
                const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" });
                if (data.length > 0) {
                    columns = Object.keys(data[0]);
                    if (!columns.includes('实际数量')) columns.unshift('实际数量');
                    inventory = data;
                    save(); renderTable();
                    alert("加载成功！共 " + data.length + " 条数据");
                }
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        };

        // 拖拽改变列宽
        function initResize(e, col) {
            const startX = e.touches[0].pageX;
            const startW = colWidths[col] || 150;
            const onMove = (ev) => {
                const diff = ev.touches[0].pageX - startX;
                colWidths[col] = Math.max(60, startW + diff);
                document.getElementById(`th-${col}`).style.width = colWidths[col] + 'px';
            };
            const onEnd = () => {
                document.removeEventListener('touchmove', onMove);
                save(); renderTable();
            };
            document.addEventListener('touchmove', onMove, { passive: false });
            document.addEventListener('touchend', onEnd, { once: true });
        }

        // 位置交换
        let pendingCol = null;
        function swapMode(col) {
            if (!pendingCol) {
                pendingCol = col;
                alert("已选中 [" + col + "]，请点击另一列的交换按钮。");
            } else {
                const i1 = columns.indexOf(pendingCol);
                const i2 = columns.indexOf(col);
                [columns[i1], columns[i2]] = [columns[i2], columns[i1]];
                pendingCol = null;
                save(); renderTable();
            }
        }

        function processBarcode(code) {
            const key = columns.find(c => /条码|码|COD|Barcode/i.test(c)) || columns[0];
            const idx = inventory.findIndex(r => String(r[key]).trim() === String(code).trim());
            if (idx !== -1) {
                inventory[idx]['实际数量'] = (parseFloat(inventory[idx]['实际数量']) || 0) + 1;
                save(); renderTable();
                const tr = document.getElementById(`row-${idx}`);
                tr.scrollIntoView({ behavior: 'smooth', block: 'center' });
                tr.classList.add('row-blink');
                setTimeout(() => tr.classList.remove('row-blink'), 2000);
            } else { alert("未找到条码: " + code); }
            document.getElementById('manualInput').value = "";
        }

        async function startScan() {
            document.getElementById('scanWin').style.display = 'flex';
            reader.decodeFromConstraints({ video: { facingMode: "environment" } }, 'video', (res) => {
                if (res) { processBarcode(res.getText()); beep(); }
            });
        }
        function stopScan() { reader.reset(); document.getElementById('scanWin').style.display = 'none'; }
        function beep() { const ctx = new AudioContext(); const osc = ctx.createOscillator(); osc.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.1); }
        function updateVal(r, c, v) { inventory[r][c] = v; save(); }
        function save() { 
            localStorage.setItem('SR10_DATA', JSON.stringify(inventory)); 
            localStorage.setItem('SR10_COLS', JSON.stringify(columns)); 
            localStorage.setItem('SR10_WIDTHS', JSON.stringify(colWidths)); 
        }
        function hardReset() { if(confirm("确定清空所有数据？")) { localStorage.clear(); location.reload(); } }
        function exportExcel() {
            const ws = XLSX.utils.json_to_sheet(inventory, { header: columns });
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Inventory");
            XLSX.writeFile(wb, "SuperRapido_V10.xlsx");
        }
        document.getElementById('manualInput').onkeydown = (e) => e.key === 'Enter' && processBarcode(e.target.value);
        if (columns.length) renderTable();
    </script>
</body>
</html>
