<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>SuperRapido V42 - 精致布局版</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@0.19.1"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; touch-action: pan-x pan-y; font-family: system-ui; }
        .table-container { background: white; border: 2px solid #1e293b; height: 65vh; overflow: auto; border-radius: 12px; position: relative; }
        table { border-collapse: separate; border-spacing: 0; table-layout: fixed; width: max-content; }
        th { position: sticky; top: 0; z-index: 50; background: #0f172a; color: white; border-right: 1px solid #334155; border-bottom: 3px solid #000; padding: 12px; font-size: 13px; text-align: left; }
        .resizer { position: absolute; right: 0; top: 0; height: 100%; width: 15px; cursor: col-resize; z-index: 60; }
        td { border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; padding: 2px; }
        .qty-input { width: 100%; height: 60px; border: 4px solid #2563eb !important; text-align: center; font-size: 2rem; font-weight: 900; color: #1e40af; border-radius: 8px; background: #fff; }
        .row-focus { background-color: #fef08a !important; outline: 6px solid #ef4444; outline-offset: -6px; }
        #toast { position: fixed; top: 15%; left: 50%; transform: translateX(-50%); color: white; padding: 20px; border-radius: 20px; z-index: 10000; display: none; font-weight: 900; text-align: center; width: 80%; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        #colModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center; }
        /* 扫码全屏层保持 V41 的安卓兼容加固样式 */
        .scan-frame { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 180px; border: 5px solid #3b82f6; border-radius: 20px; box-shadow: 0 0 0 2000px rgba(0,0,0,0.7); z-index: 10; pointer-events: none; }
        .scan-line { position: absolute; width: 100%; height: 4px; background: #3b82f6; top: 0; animation: scanLineMove 1s infinite linear; box-shadow: 0 0 15px #3b82f6; }
        @keyframes scanLineMove { 0% { top: 5%; } 100% { top: 95%; } }
    </style>
</head>
<body class="p-2">
    <div id="toast"></div>

    <div id="colModal">
        <div class="bg-white w-11/12 max-h-[85vh] rounded-3xl p-6 overflow-auto border-4 border-slate-900 shadow-2xl text-slate-800">
            <h2 class="text-2xl font-black mb-4 border-b-2 pb-2">列管理 / Gestión</h2>
            <div id="colList" class="space-y-2 mb-6"></div>
            <div class="flex gap-2 p-3 bg-slate-100 rounded-2xl border-2">
                <input type="text" id="newColName" placeholder="新列名称..." class="flex-1 bg-transparent font-bold outline-none text-lg" />
                <button onclick="addColumn()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">添加</button>
            </div>
            <button onclick="closeColModal()" class="w-full mt-6 bg-slate-900 text-white py-5 rounded-2xl font-black text-xl">完成返回</button>
        </div>
    </div>

    <div class="flex flex-col h-screen">
        <div class="flex justify-between items-center mb-1">
            <h1 class="text-lg font-black text-slate-900">V42 <span class="bg-blue-600 text-white text-[9px] px-1.5 py-0.5 rounded ml-1 uppercase tracking-wider">Compact</span></h1>
            <div class="flex gap-1.5">
                <button onclick="openColModal()" class="bg-slate-700 text-white text-[10px] px-3 py-1.5 rounded-full font-bold shadow-sm">列管理</button>
                <button onclick="hardReset()" class="bg-red-600 text-white text-[10px] px-3 py-1.5 rounded-full font-bold shadow-sm">清空重置</button>
            </div>
        </div>

        <div class="bg-white p-1.5 rounded-2xl shadow border-2 border-slate-200 mb-2">
            <div class="flex gap-1.5 items-center">
                <button onclick="startScanning()" class="bg-blue-600 text-white w-15 h-15 flex items-center justify-center rounded-xl active:scale-90 text-2xl shadow-md shrink-0 border-2 border-white">📷</button>
                
                <div class="flex-1 flex flex-col gap-1">
                    <div class="flex gap-1">
                        <input type="text" id="manualInput" placeholder="扫码枪/手动输入..." autofocus
                            class="flex-1 border-2 border-blue-100 rounded-lg px-2.5 h-10 font-bold outline-none focus:border-blue-500 text-base" />
                        <button onclick="handleBarcode(manualInput.value)" class="bg-slate-800 text-white px-3.5 rounded-lg font-black text-xs h-10 active:scale-95">确认</button>
                    </div>
                    <label class="bg-slate-100 text-slate-500 h-8 flex items-center justify-center rounded-lg border-2 border-dashed border-slate-300 text-xs font-bold active:bg-slate-200 cursor-pointer">
                        📂 导入 EXCEL <input type="file" id="fileInput" class="hidden" accept=".xlsx, .xls" />
                    </label>
                </div>
            </div>
        </div>

        <div class="table-container shadow-2xl">
            <table id="mainTable"><thead id="tHead"></thead><tbody id="tBody"></tbody></table>
        </div>
        <button onclick="exportExcel()" class="mt-2.5 bg-emerald-700 text-white py-4.5 rounded-2xl font-black text-xl shadow-xl active:scale-95 active:bg-emerald-900">💾 保存导出 Excel</button>
    </div>

    <div id="scanUI" class="fixed inset-0 bg-black z-[999] hidden flex-col">
        <div class="p-4 flex justify-between items-center bg-slate-900 text-white border-b-2 border-blue-500">
            <span class="font-bold text-blue-400 italic">正在寻找条码...</span>
            <button onclick="stopScanning()" class="bg-red-600 px-8 py-2 rounded-full font-bold">关闭</button>
        </div>
        <div class="relative flex-1 overflow-hidden bg-black">
            <video id="v" class="w-full h-full object-cover" playsinline muted></video>
            <div class="scan-frame"><div class="scan-line"></div></div>
        </div>
    </div>

    <script>
        const VER = "SR42_COMPACT_LAYOUT";
        let db = JSON.parse(localStorage.getItem(VER+'_DATA')) || [];
        let columns = JSON.parse(localStorage.getItem(VER+'_COLS')) || [];
        let widths = JSON.parse(localStorage.getItem(VER+'_W')) || {};

        const hints = new Map();
        hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
            ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.EAN_8,
            ZXing.BarcodeFormat.CODE_128, ZXing.BarcodeFormat.UPC_A
        ]);
        hints.set(ZXing.DecodeHintType.TRY_HARDER, true); 
        
        const zxing = new ZXing.BrowserMultiFormatReader(hints);
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playFeedback(isSuccess) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(isSuccess ? 1200 : 180, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        // 文件加载逻辑 (原逻辑锁死)
        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const r = new FileReader();
            r.onload = (ev) => {
                try {
                    const data = new Uint8Array(ev.target.result);
