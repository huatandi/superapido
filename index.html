<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>SuperRapido V50 Fast</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@0.19.1"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; font-family: system-ui; }
        /* 针对 iOS 的画面优化：提高对比度，让条码黑白更分明 */
        #v { 
            width: 100%; height: 100%; object-fit: cover;
            filter: contrast(1.2) brightness(1.1); 
            -webkit-filter: contrast(1.2) brightness(1.1);
        }
        .table-container { background: white; border: 2px solid #1e293b; height: 55vh; overflow: auto; border-radius: 12px; }
        .qty-input { width: 100%; height: 65px; border: 4px solid #2563eb !important; text-align: center; font-size: 2.2rem; font-weight: 900; color: #1e40af; }
        .row-focus { background-color: #fef08a !important; outline: 6px solid #ef4444; outline-offset: -6px; }
        .scan-frame { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); width: 85%; height: 200px; border: 4px solid #3b82f6; border-radius: 20px; box-shadow: 0 0 0 2000px rgba(0,0,0,0.6); z-index: 10; pointer-events: none; }
    </style>
</head>
<body class="p-2">
    <div class="flex flex-col h-screen">
        <div class="flex items-center justify-between mb-3 px-1">
            <h1 class="text-3xl font-black text-slate-900 tracking-tighter">V50 FAST</h1>
            <button onclick="hardReset()" class="bg-red-600 text-white px-4 py-2 rounded-xl font-bold text-sm">重置</button>
        </div>

        <div class="flex gap-3 mb-4 bg-white p-3 rounded-3xl shadow-xl items-center border-2 border-slate-100">
            <button onclick="startScanning()" class="w-24 h-24 bg-blue-600 text-white rounded-3xl active:scale-90 text-4xl shadow-lg">📷</button>
            <div class="flex-1">
                <input type="text" id="manualInput" placeholder="输入条码..." class="w-full border-4 border-blue-50 rounded-xl px-4 h-12 font-bold outline-none mb-2" />
                <button onclick="handleBarcode(manualInput.value)" class="w-full bg-blue-700 text-white py-3 rounded-xl font-black">确认 / Confirmar</button>
            </div>
        </div>

        <div class="table-container"><table id="mainTable" class="w-max"><thead id="tHead" class="bg-slate-900 text-white"></thead><tbody id="tBody"></tbody></table></div>
        <button onclick="exportExcel()" class="mt-4 bg-emerald-700 text-white py-5 rounded-2xl font-black text-2xl border-b-8 border-emerald-900">💾 导出 Excel</button>
    </div>

    <div id="scanUI" class="fixed inset-0 bg-black z-[999] hidden flex-col">
        <div class="p-4 flex justify-between items-center bg-slate-900 text-white border-b-2 border-blue-500">
            <span class="font-bold text-blue-400">极速扫描模式 (720P Optimized)</span>
            <button onclick="stopScanning()" class="bg-red-600 px-8 py-3 rounded-full font-black text-white">退出</button>
        </div>
        <div class="relative flex-1 overflow-hidden">
            <video id="v" playsinline muted></video>
            <div class="scan-frame"></div>
        </div>
    </div>

    <script>
        const VER = "SR_V50_FAST_720";
        let db = JSON.parse(localStorage.getItem(VER+'_DATA')) || [];
        let columns = JSON.parse(localStorage.getItem(VER+'_COLS')) || [];
        let lastCode = ""; let lastTime = 0;

        const hints = new Map();
        hints.set(ZXing.DecodeHintType.TRY_HARDER, true); 
        const zxing = new ZXing.BrowserMultiFormatReader(hints);

        async function startScanning() {
            document.getElementById('scanUI').style.display = 'flex';
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
            
            try {
                const devices = await zxing.listVideoInputDevices();
                let backId = devices.find(d => d.label.toLowerCase().includes('back') || d.label.toLowerCase().includes('后置'))?.deviceId;
                
                const constraints = {
                    video: { 
                        deviceId: backId, 
                        facingMode: "environment",
                        // 统一锁定 720P，确保计算不卡顿
                        width: { ideal: 1280 }, 
                        height: { ideal: 720 },
                        frameRate: { ideal: 30 }
                    }
                };

                zxing.decodeFromConstraints(constraints, 'v', (res) => {
                    if (res) {
                        const code = res.getText();
                        const now = Date.now();
                        if (code === lastCode && (now - lastTime < 2000)) return;
                        lastCode = code; lastTime = now;
                        handleBarcode(code, true);
                    }
                });

                // 核心提速补丁
                const track = document.getElementById('v').srcObject?.getVideoTracks()[0];
                if (track) {
                    const cap = track.getCapabilities();
                    // iOS/安卓通用：稍微拉近一点，解决“远一点”看不清的问题
                    if (cap.zoom) {
                        // 设定为 1.5 到 1.8 之间，既能扫到更远的，又不至于画面太晃
                        track.applyConstraints({ advanced: [{ zoom: 1.7 }] }).catch(()=>{});
                    }
                }
            } catch (err) { stopScanning(); alert("相机启动失败"); }
        }

        function stopScanning() { zxing.reset(); document.getElementById('scanUI').style.display = 'none'; }

        function handleBarcode(code, fromCam = false) {
            if(!code) return;
            const target = String(code).trim().toLowerCase();
            const idx = db.findIndex(row => Object.values(row).some(v => String(v).trim().toLowerCase() === target));
            if (idx !== -1) {
                render();
                const rowEl = document.getElementById(`r-${idx}`);
                const inputEl = document.getElementById(`in-${idx}-实际数量`);
                document.querySelectorAll('tr').forEach(tr => tr.classList.remove('row-focus'));
                if (rowEl) {
                    rowEl.classList.add('row-focus');
                    rowEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    setTimeout(() => { if(inputEl){inputEl.focus(); inputEl.select();} }, 300);
                }
                if(fromCam) stopScanning();
            } else { alert("未找到条码: " + target); }
        }

        // 文件导入逻辑
        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0]; if (!file) return;
            const r = new FileReader();
            r.onload = (ev) => {
                const data = new Uint8Array(ev.target.result);
                const wb = XLSX.read(data, { type: 'array' });
                const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" });
                if (json.length) {
                    columns = Object.keys(json[0]);
                    if (!columns.includes('实际数量')) columns.unshift('实际数量');
                    db = json; push(); render();
                }
            };
            r.readAsArrayBuffer(file);
        };

        function render() {
            const h = document.getElementById('tHead'); const b = document.getElementById('tBody');
            if (!columns.length) return;
            h.innerHTML = `<tr>${columns.map(c => `<th class="p-3 border-r border-slate-700 min-w-[120px]">${c}</th>`).join('')}</tr>`;
            b.innerHTML = db.map((row, rIdx) => `<tr id="r-${rIdx}">${columns.map(c => `<td><input id="in-${rIdx}-${c}" type="${c==='实际数量'?'number':'text'}" value="${row[c]||''}" class="${c==='实际数量'?'qty-input':'p-2 w-full outline-none'}" onchange="db[${rIdx}]['${c}']=this.value;push();" /></td>`).join('')}</tr>`).join('');
        }
        function push() { localStorage.setItem(VER+'_DATA', JSON.stringify(db)); localStorage.setItem(VER+'_COLS', JSON.stringify(columns)); }
        function exportExcel() { const ws = XLSX.utils.json_to_sheet(db); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Stock"); XLSX.writeFile(wb, `Stock_Fast.xlsx`); }
        function hardReset() { if(confirm("清空？")) { localStorage.clear(); location.reload(); } }
        if (columns.length) render();
    </script>
</body>
</html>
