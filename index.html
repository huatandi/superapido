<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SuperRapido V46 - 核心修复版</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@0.19.1"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 强制禁止页面晃动，确保 iOS 稳定 */
        html, body { position: fixed; width: 100%; height: 100%; overflow: hidden; background: #f8fafc; font-family: system-ui; }
        .main-layout { display: flex; flex-direction: column; height: 100dvh; padding: 8px; }
        .table-area { flex: 1; background: white; border: 2px solid #1e293b; border-radius: 12px; overflow: auto; margin-bottom: 8px; position: relative; }
        table { border-collapse: separate; border-spacing: 0; width: max-content; }
        th { position: sticky; top: 0; z-index: 40; background: #0f172a; color: white; padding: 10px; font-size: 13px; border-right: 1px solid #334155; }
        td { border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; padding: 2px; }
        .qty-input { width: 100%; height: 50px; border: 3px solid #2563eb !important; text-align: center; font-size: 1.5rem; font-weight: 900; color: #1e40af; border-radius: 8px; }
        .row-focus { background-color: #fef08a !important; outline: 5px solid #ef4444; outline-offset: -5px; }
        
        /* 扫码层 - 针对 iOS 深度优化 */
        #scanUI { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; }
        #v { width: 100%; height: 100%; object-fit: cover; }
        .scan-mask { position: absolute; inset: 0; border: 40px solid rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; pointer-events: none; }
        .scan-box { width: 260px; height: 160px; border: 4px solid #3b82f6; border-radius: 16px; position: relative; box-shadow: 0 0 20px rgba(59,130,246,0.5); }
        .line { position: absolute; width: 100%; height: 2px; background: #3b82f6; top: 0; animation: move 2s infinite linear; }
        @keyframes move { 0% { top: 0; } 100% { top: 100%; } }
        
        #toast { position: fixed; top: 10%; left: 50%; transform: translateX(-50%); z-index: 10001; padding: 15px 30px; border-radius: 50px; color: white; font-weight: bold; display: none; white-space: nowrap; }
    </style>
</head>
<body>
    <div id="toast"></div>

    <div class="main-layout">
        <div class="flex justify-between items-center mb-2">
            <span class="font-black text-slate-800 text-sm">V46 STABLE</span>
            <div class="flex gap-2">
                <button onclick="localStorage.clear(); location.reload();" class="bg-red-500 text-white text-[10px] px-3 py-1 rounded-full font-bold">强制重置</button>
            </div>
        </div>

        <div class="bg-white p-2 rounded-xl shadow-sm border border-slate-200 mb-2">
            <div class="flex gap-2 items-center">
                <button onclick="startScan()" class="bg-blue-600 text-white w-14 h-14 rounded-xl flex items-center justify-center text-2xl shadow-lg active:scale-95 shrink-0">📷</button>
                <div class="flex-1 flex flex-col gap-1">
                    <div class="flex gap-1">
                        <input type="text" id="manualInput" placeholder="输入条码..." class="flex-1 border border-slate-300 rounded-lg px-2 h-9 text-sm font-bold outline-none focus:border-blue-500" />
                        <button onclick="handleCode(manualInput.value)" class="bg-slate-800 text-white px-3 rounded-lg text-xs font-bold h-9">确认</button>
                    </div>
                    <label class="bg-slate-100 text-slate-500 h-7 flex items-center justify-center rounded-lg border border-dashed border-slate-400 text-[10px] font-bold cursor-pointer">
                        📂 导入文件 <input type="file" id="fileIn" class="hidden" accept=".xlsx, .xls" />
                    </label>
                </div>
            </div>
        </div>

        <div class="table-area">
            <table id="mainTable"><thead id="tHead"></thead><tbody id="tBody"></tbody></table>
        </div>

        <button onclick="exportData()" class="bg-emerald-600 text-white py-4 rounded-xl font-black text-lg shadow-lg active:bg-emerald-700">💾 保存导出 Excel</button>
    </div>

    <div id="scanUI">
        <div class="flex justify-between items-center p-4 bg-slate-900 text-white text-sm">
            <span class="font-bold text-blue-400">正在寻找条码...</span>
            <button onclick="stopScan()" class="bg-red-600 px-6 py-1.5 rounded-full font-bold">退出</button>
        </div>
        <div class="relative flex-1 bg-black">
            <video id="v" playsinline muted autoplay></video>
            <div class="scan-mask"><div class="scan-box"><div class="line"></div></div></div>
        </div>
    </div>

    <script>
        const KEY = "SR_V46_DATA";
        let db = JSON.parse(localStorage.getItem(KEY)) || [];
        let cols = JSON.parse(localStorage.getItem(KEY+'_COLS')) || [];
        const zxing = new ZXing.BrowserMultiFormatReader();

        // 文件导入修复
        document.getElementById('fileIn').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const wb = XLSX.read(new Uint8Array(ev.target.result), { type: 'array' });
                const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" });
                if (data.length) {
                    cols = Object.keys(data[0]);
                    if (!cols.includes('实际数量')) cols.unshift('实际数量');
                    db = data; save(); render();
                    showMsg("✅ 成功导入 " + data.length + " 条数据", false);
                }
            };
            reader.readAsArrayBuffer(file);
        };

        // --- 核心修复：iPhone/安卓兼容性启动 ---
        async function startScan() {
            document.getElementById('scanUI').style.display = 'flex';
            const video = document.getElementById('v');

            try {
                // 尝试最严苛的 iOS 模式
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                video.srcObject = stream;
                
                // 解决 iOS 必须在 play() 后才能 decode 的问题
                video.onloadedmetadata = () => {
                    video.play().then(() => {
                        zxing.decodeFromStream(stream, 'v', (res) => {
                            if (res) { handleCode(res.getText()); stopScan(); }
                        });
                    });
                };
            } catch (err) {
                // 降级方案：自动尝试不指定 facingMode
                navigator.mediaDevices.getUserMedia({ video: true })
                    .then(s => {
                        video.srcObject = s;
                        video.play();
                        zxing.decodeFromStream(s, 'v', (res) => {
                            if (res) { handleCode(res.getText()); stopScan(); }
                        });
                    })
                    .catch(e => {
                        alert("摄像头无法启动，请检查浏览器权限设置！");
                        stopScan();
                    });
            }
        }

        function stopScan() {
            zxing.reset();
            const video = document.getElementById('v');
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(t => t.stop());
                video.srcObject = null;
            }
            document.getElementById('scanUI').style.display = 'none';
        }

        function handleCode(code) {
            if (!code) return;
            const val = String(code).trim().toLowerCase();
            const idx = db.findIndex(r => Object.values(r).some(v => String(v).toLowerCase() === val));
            
            if (idx !== -1) {
                render();
                const row = document.getElementById(`r-${idx}`);
                const input = document.getElementById(`in-${idx}-实际数量`);
                if (row && input) {
                    row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    row.classList.add('row-focus');
                    setTimeout(() => { input.focus(); input.select(); }, 400);
                }
                manualInput.value = "";
            } else {
                showMsg("❌ 未找到: " + code);
            }
        }

        function render() {
            if (!cols.length) return;
            document.getElementById('tHead').innerHTML = `<tr>${cols.map(c => `<th>${c}</th>`).join('')}</tr>`;
            document.getElementById('tBody').innerHTML = db.map((r, i) => `
                <tr id="r-${i}">
                    ${cols.map(c => `<td><input id="in-${i}-${c}" type="${c==='实际数量'?'number':'text'}" 
                        class="${c==='实际数量'?'qty-input':'p-2 w-full text-xs outline-none bg-transparent'}" 
                        value="${r[c]||''}" onchange="update(${i},'${c}',this.value)" /></td>`).join('')}
                </tr>`).join('');
        }

        function update(i, c, v) { db[i][c] = v; save(); }
        function save() { 
            localStorage.setItem(KEY, JSON.stringify(db)); 
            localStorage.setItem(KEY+'_COLS', JSON.stringify(cols));
        }
        function showMsg(m, isErr=true) {
            const t = document.getElementById('toast'); t.innerText = m;
            t.style.background = isErr ? '#ef4444' : '#10b981';
            t.style.display = 'block'; setTimeout(() => t.style.display='none', 2000);
        }
        function exportData() {
            const ws = XLSX.utils.json_to_sheet(db, { header: cols });
            const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Stock");
            XLSX.writeFile(wb, `Stock_${new Date().getTime()}.xlsx`);
        }
        if (cols.length) render();
        document.getElementById('manualInput').onkeydown = (e) => { if(e.key==='Enter') handleCode(e.target.value); };
    </script>
</body>
</html>
