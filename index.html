
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>SuperRapido V40 - 扫码稳健版</title>

<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/@zxing/library@0.19.1"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background-color: #f8fafc; touch-action: pan-x pan-y; font-family: system-ui; }
.table-container { background: white; border: 2px solid #1e293b; height: 60vh; overflow: auto; border-radius: 12px; position: relative; }
table { border-collapse: separate; border-spacing: 0; table-layout: fixed; width: max-content; }
th { position: sticky; top: 0; z-index: 50; background: #0f172a; color: white; border-right: 1px solid #334155; border-bottom: 3px solid #000; padding: 12px; font-size: 13px; text-align: left; }
.resizer { position: absolute; right: 0; top: 0; height: 100%; width: 15px; cursor: col-resize; z-index: 60; }
td { border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; padding: 2px; }
.qty-input { width: 100%; height: 65px; border: 4px solid #2563eb !important; text-align: center; font-size: 2.2rem; font-weight: 900; color: #1e40af; border-radius: 8px; background: #fff; }
.row-focus { background-color: #fef08a !important; outline: 6px solid #ef4444; outline-offset: -6px; }
#toast { position: fixed; top: 15%; left: 50%; transform: translateX(-50%); color: white; padding: 20px; border-radius: 20px; z-index: 10000; display: none; font-weight: 900; text-align: center; width: 80%; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
#colModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center; }
.scan-frame { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 180px; border: 5px solid #3b82f6; border-radius: 20px; box-shadow: 0 0 0 2000px rgba(0,0,0,0.7); z-index: 10; pointer-events: none; }
.scan-line { position: absolute; width: 100%; height: 4px; background: #3b82f6; top: 0; animation: scanLineMove 1s infinite linear; box-shadow: 0 0 15px #3b82f6; }
@keyframes scanLineMove { 0% { top: 5%; } 100% { top: 95%; } }
.giant-cam-btn { width: 90px !important; height: 90px !important; font-size: 45px !important; flex-shrink: 0; box-shadow: 0 8px 25px rgba(37, 99, 235, 0.5); border: 4px solid white; }
</style>
</head>

<body class="p-2">

<div id="toast"></div>

<div class="flex flex-col h-screen">

<div class="flex gap-2 mb-3 bg-white p-2 rounded-2xl shadow-lg border-2 border-slate-200 items-center">
<button onclick="startScanning()" class="bg-blue-600 text-white rounded-2xl giant-cam-btn">📷</button>

<div class="flex-1 flex flex-col gap-1">
<div class="flex gap-1">
<input type="text" id="manualInput" placeholder="扫码枪输入..." autofocus
class="flex-1 border-4 border-blue-100 rounded-xl px-3 h-14 font-bold outline-none focus:border-blue-600 text-lg" />
<button onclick="handleBarcode(manualInput.value)" class="bg-slate-800 text-white px-4 rounded-xl font-black text-xs h-14">确认</button>
</div>
</div>
</div>

<div class="table-container">
<table id="mainTable">
<thead id="tHead"></thead>
<tbody id="tBody"></tbody>
</table>
</div>

</div>

<div id="scanUI" class="fixed inset-0 bg-black z-[999] hidden flex-col">
<video id="v" class="w-full h-full object-cover" playsinline></video>
</div>

<script>

const hints = new Map();
hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
ZXing.BarcodeFormat.EAN_13,
ZXing.BarcodeFormat.EAN_8,
ZXing.BarcodeFormat.CODE_128,
ZXing.BarcodeFormat.UPC_A,
ZXing.BarcodeFormat.CODE_39
]);
hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
hints.set(ZXing.DecodeHintType.ALSO_INVERTED, true);

const zxing = new ZXing.BrowserMultiFormatReader(hints);

// ✅ 防抖
let lastScanTime = 0;
let lastScanCode = "";
const SCAN_COOLDOWN = 600;

let currentStream = null;

function handleBarcode(code, isFromCamera = false) {

const now = Date.now();
const cleaned = String(code || '').trim();

if (isFromCamera) {
if (cleaned === lastScanCode && (now - lastScanTime) < SCAN_COOLDOWN) {
return;
}
lastScanCode = cleaned;
lastScanTime = now;
}

alert("扫描到: " + cleaned); // 示例

}

async function startScanning() {

document.getElementById('scanUI').style.display = 'flex';

try {

const video = document.getElementById('v');

video.setAttribute('playsinline', true);
video.setAttribute('muted', true);
video.setAttribute('autoplay', true);

const stream = await navigator.mediaDevices.getUserMedia({
audio: false,
video: {
facingMode: { ideal: "environment" },
width: { ideal: 1280 },
height: { ideal: 720 }
}
});

currentStream = stream;

video.srcObject = stream;
await video.play();

setTimeout(() => {
zxing.decodeFromVideoElement(video, (res) => {
if (res) handleBarcode(res.getText(), true);
});
}, 300);

} catch (err) {
alert("相机异常");
stopScanning();
}
}

function stopScanning() {
zxing.reset();

if (currentStream) {
currentStream.getTracks().forEach(t => t.stop());
currentStream = null;
}

document.getElementById('scanUI').style.display = 'none';
}

</script>

</body>
</html>
