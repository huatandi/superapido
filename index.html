<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>SuperRapido V50 Pro</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@0.19.1"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; touch-action: pan-x pan-y; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .table-container { background: white; border: 2px solid #1e293b; height: 55vh; overflow: auto; border-radius: 12px; -webkit-overflow-scrolling: touch; }
        table { border-collapse: separate; border-spacing: 0; table-layout: fixed; width: max-content; }
        th { position: sticky; top: 0; z-index: 50; background: #0f172a; color: white; border-right: 1px solid #334155; border-bottom: 3px solid #000; padding: 12px; font-size: 13px; text-align: left; }
        .resizer { position: absolute; right: 0; top: 0; height: 100%; width: 15px; cursor: col-resize; z-index: 60; }
        td { border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; padding: 2px; }
        .qty-input { width: 100%; height: 65px; border: 4px solid #2563eb !important; text-align: center; font-size: 2.2rem; font-weight: 900; color: #1e40af; border-radius: 8px; background: #fff; -webkit-appearance: none; }
        .row-focus { background-color: #fef08a !important; outline: 6px solid #ef4444; outline-offset: -6px; }
        #toast { position: fixed; top: 15%; left: 50%; transform: translateX(-50%); color: white; padding: 20px; border-radius: 20px; z-index: 10000; display: none; font-weight: 900; text-align: center; width: 80%; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        #colModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center; }
        .scan-frame { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 85%; height: 220px; border: 3px solid #3b82f6; border-radius: 20px; box-shadow: 0 0 0 2000px rgba(0,0,0,0.6); z-index: 10; pointer-events: none; }
        .scan-line { position: absolute; width: 100%; height: 3px; background: #3b82f6; top: 0; animation: scanLineMove 1.5s infinite cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 15px #3b82f6; will-change: top; }
        @keyframes scanLineMove { 0% { top: 5%; } 50% { top: 95%; } 100% { top: 5%; } }
        .giant-cam-btn { width: 100px !important; height: 100px !important; font-size: 50px !important; flex-shrink: 0; box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4); border: 4px solid white; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="p-2">
    <div id="toast"></div>

    <div id="colModal">
        <div class="bg-white w-11/12 max-h-[85vh] rounded-3xl p-6 overflow-auto border-4 border-slate-900 shadow-2xl">
            <h2 class="text-2xl font-black mb-4 border-b-2 pb-2 text-center text-slate-800">列管理 / Columnas</h2>
            <div id="colList" class="space-y-2 mb-6"></div>
            <div class="flex gap-2 p-3 bg-slate-100 rounded-2xl border-2">
                <input type="text" id="newColName" placeholder="新列名..." class="flex-1 bg-transparent font-bold outline-none text-lg" />
                <button onclick="addColumn()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">添加</button>
            </div>
            <button onclick="closeColModal()" class="w-full mt-6 bg-slate-900 text-white py-5 rounded-2xl font-black text-xl">完成返回</button>
        </div>
    </div>

    <div class="flex flex-col h-screen">
        <div class="flex items-center justify-between mb-3 px-1">
            <h1 class="text-3xl font-black text-slate-900 tracking-tighter italic">V50</h1>
            <div class="flex flex-1 justify-end gap-3 ml-4">
                <button onclick="openColModal()" class="flex-1 bg-slate-800 text-white py-3 rounded-xl font-black text-sm shadow-md">列管理</button>
                <button onclick="hardReset()" class="flex-1 bg-red-600 text-white py-3 rounded-xl font-black text-sm shadow-md">清空重置</button>
            </div>
        </div>

        <div class="flex gap-3 mb-4 bg-white p-3 rounded-3xl shadow-xl border-2 border-slate-100 items-center">
            <button onclick="startScanning()" class="bg-blue-600 text-white rounded-3xl active:scale-95 giant-cam-btn">📷</button>
            <div class="flex-1 flex flex-col gap-2">
                <div class="flex flex-col gap-1">
                    <input type="text" id="manualInput" placeholder="点击手动输入..." autofocus
                        class="w-full border-4 border-blue-50 border-b-blue-200 rounded-xl px-4 h-12 font-bold outline-none focus:border-blue-600 text-lg" />
                    <button id="confirmBtn" class="w-full bg-blue-700 text-white py-3 rounded-xl font-black text-lg shadow-lg active:scale-95">确 认 / Confirmar</button>
                </div>
                <label class="bg-slate-50 text-slate-400 h-10 flex items-center justify-center rounded-xl border-2 border-dashed border-slate-200 text-[10px] font-black uppercase">
                    📂 导入 EXCEL <input type="file" id="fileInput" class="hidden" accept=".xlsx, .xls" />
                </label>
            </div>
        </div>

        <div class="table-container">
            <table id="mainTable"><thead id="tHead"></thead><tbody id="tBody"></tbody></table>
        </div>
        
        <button onclick="exportExcel()" class="mt-4 bg-emerald-700 text-white py-5 rounded-2xl font-black text-2xl shadow-xl active:scale-95 border-b-8 border-emerald-900">💾 导出保存 Excel</button>
    </div>

    <div id="scanUI" class="fixed inset-0 bg-black z-[999] hidden flex-col">
        <div class="p-4 flex justify-between items-center bg-slate-900 text-white border-b-2 border-blue-500">
            <span class="font-bold text-blue-400">扫描模式 (高性能)</span>
            <button onclick="stopScanning()" class="bg-red-600 px-10 py-3 rounded-full font-black">退出</button>
        </div>
        <div class="relative flex-1 overflow-hidden bg-black">
            <video id="v" class="w-full h-full object-cover" playsinline muted></video>
            <div class="scan-frame"><div class="scan-line"></div></div>
        </div>
    </div>
