<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V50 STABLE</title>

<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/@zxing/library@0.19.1"></script>

<style>
body{font-family:sans-serif;background:#f1f5f9;padding:10px}
table{border-collapse:collapse;width:100%}
th{background:#111;color:#fff;padding:8px}
td{border:1px solid #ccc}
input{width:100%;padding:6px;border:none}
.qty{font-size:20px;text-align:center;border:2px solid #2563eb}
.row-focus{background:#fef08a}
#video{width:100%;display:none}
</style>
</head>

<body>

<h2>扫码盘点（稳定版）</h2>

<button onclick="startScan()">📷 扫码</button>
<input id="manual" placeholder="手动输入条码">
<button onclick="manual()">确认</button>

<br><br>

<input type="file" id="file">

<table>
<thead id="head"></thead>
<tbody id="body"></tbody>
</table>

<br>
<button onclick="exportExcel()">导出Excel</button>

<video id="video" playsinline></video>

<script>

let db=[],cols=[];

const normalize=v=>String(v).replace(/\s/g,'').toLowerCase();

/* ===== Excel 导入（稳定版） ===== */
document.getElementById("file").onchange=function(e){
const file=e.target.files[0];
if(!file)return;

const reader=new FileReader();

reader.onload=function(ev){
try{
const data=new Uint8Array(ev.target.result);
const wb=XLSX.read(data,{type:'array'});
const sheet=wb.Sheets[wb.SheetNames[0]];
const json=XLSX.utils.sheet_to_json(sheet,{defval:""});

if(!json.length){
alert("空文件");return;
}

cols=Object.keys(json[0]);

if(!cols.includes("实际数量")){
cols.unshift("实际数量");
json.forEach(r=>r["实际数量"]="");
}

db=json;
save();
render();

}catch(e){
alert("文件错误");
}
};

reader.readAsArrayBuffer(file);
};

/* ===== 渲染 ===== */
function render(){
head.innerHTML="<tr>"+cols.map(c=>"<th>"+c+"</th>").join("")+"</tr>";

body.innerHTML=db.map((r,i)=>`
<tr id="r${i}">
${cols.map(c=>`
<td>
<input value="${r[c]||""}"
class="${c=="实际数量"?"qty":""}"
onchange="edit(${i},'${c}',this.value)">
</td>`).join("")}
</tr>
`).join("");
}

/* ===== 修改 ===== */
function edit(i,c,v){
db[i][c]=v;
save();
}

/* ===== 扫码 ===== */
const hints=new Map();
hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS,[
ZXing.BarcodeFormat.CODE_128,
ZXing.BarcodeFormat.EAN_13,
ZXing.BarcodeFormat.UPC_A
]);

const readerZX=new ZXing.BrowserMultiFormatReader(hints);
readerZX.timeBetweenDecodingAttempts=0;

let last="",time=0;

function startScan(){
video.style.display="block";

readerZX.decodeFromConstraints({
video:{facingMode:"environment",width:{ideal:640},height:{ideal:480}}
},"video",(res)=>{
if(res){
let code=res.getText();
let now=Date.now();

if(code===last && now-time<800)return;
last=code;time=now;

handle(code);
}
});
}

/* ===== 处理条码 ===== */
function handle(code){
const t=normalize(code);

let idx=db.findIndex(r=>
Object.values(r).some(v=>normalize(v)==t)
);

if(idx!=-1){

document.querySelectorAll("tr").forEach(tr=>tr.classList.remove("row-focus"));

let row=document.getElementById("r"+idx);
if(row){
row.classList.add("row-focus");
row.scrollIntoView({block:"center"});
}

}else{
navigator.vibrate&&navigator.vibrate(100);
}
}

/* ===== 手动 ===== */
function manual(){
handle(document.getElementById("manual").value);
document.getElementById("manual").value="";
}

/* ===== 导出 ===== */
function exportExcel(){
let ws=XLSX.utils.json_to_sheet(db,{header:cols});
let wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"data");
XLSX.writeFile(wb,"库存.xlsx");
}

/* ===== 存储 ===== */
function save(){
localStorage.setItem("db",JSON.stringify(db));
localStorage.setItem("cols",JSON.stringify(cols));
}

try{
db=JSON.parse(localStorage.getItem("db"))||[];
cols=JSON.parse(localStorage.getItem("cols"))||[];
}catch(e){}

if(cols.length)render();

</script>

</body>
</html>
