<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>SuperRapido V6 - 点选交换版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        html, body { min-height: 100vh; background-color: #f1f5f9; }
        .table-container { background: white; border-radius: 12px; overflow: auto; border: 1px solid #cbd5e1; }
        
        /* 数量框：超大加粗 */
        .qty-input { border: 3px solid #2563eb !important; background: #eff6ff !important; font-weight: 900; text-align: center; font-size: 1.3rem; border-radius: 8px; }
        
        /* 表头单元格 */
        th { position: relative; border-right: 1px solid #cbd5e1; padding: 12px 8px !important; }
        
        /* 极灵敏的列宽调节区 */
        .resizer {
            position: absolute; right: 0; top: 0; width: 30px; height: 100%;
            z-index: 50; cursor: col-resize; touch-action: none;
            display: flex; align-items: center; justify-content: center;
        }
        .resizer::after { content: ""; width: 4px; height: 40%; background: #94a3b8; border-radius: 2px; }
        .resizer:active { background: rgba(37, 99, 235, 0.1); }
        .resizer:active::after { background: #2563eb; width: 6px; }

        /* 交换模式高亮 */
        .swapping { background-color: #fef08a !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        
        @keyframes scanMove { 0% { top: 0%; } 100% { top: 100%; } }
        .scanner-line { position: absolute; width: 100%; height: 2px; background: #60a5fa; box-shadow: 0 0 15px #60a5fa; animation: scanMove 2s linear infinite; }
    </style>
</head>
<body class="p-2">
    <div id="app" class="flex flex-col h-screen">
        <div class="flex justify-between items-center mb-3">
            <h1 class="text-2xl font-black text-blue-900 italic">SuperRapido <span class="text-xs font-bold text-blue-500">V6</span></h1>
            <div class="flex gap-2 text-[10px]">
                <button onclick="resetSystem()" class="bg-white border px-2 py-1 rounded text-red-500">清空</button>
            </div>
        </div>

        <div class="flex gap-2 mb-4 bg-white p-2 rounded-xl shadow-sm">
            <label class="bg-slate-800 text-white p-4 rounded-xl flex items-center justify-center">
                📂 <input type="file" id="fileInput" class="hidden" accept=".xlsx, .xls" />
            </label>
            <div class="flex-1 flex gap-1">
                <input type="text" id="manualInput" placeholder="点击输入条码" class="flex-1 border border-slate-300 rounded-xl px-3 outline-none focus:border-blue-500 font-bold" />
                <button onclick="startContinuousScan()" class="bg-blue-600 text-white px-5 rounded-xl font-bold active:bg-blue-700">📷 扫码</button>
            </div>
        </div>

        <div class="table-container flex-1 border border-slate-300 shadow-lg">
            <table id="mainTable" class="border-collapse table-fixed w-max">
                <thead id="tHead" class="sticky top-0 bg-slate-100 z-30"></thead>
                <tbody id="tBody"></tbody>
            </table>
        </div>

        <button onclick="exportData()" class="mt-3 bg-emerald-700 text-white py-4 rounded-xl font-black text-lg shadow-xl active:scale-95 transition-transform">
            导出 EXCEL 盘点表
        </button>

        <div id="scannerModal" class="fixed inset-0 bg-black z-[999] hidden flex-col">
            <div class="p-6 flex justify-between items-center bg-black/80 text-white">
                <div>
                    <div class="font-bold">连扫模式 (不自动关闭)</div>
                    <div id="scanFeedback" class="text-xs text-blue-400">准备扫描...</div>
                </div>
                <button onclick="stopScan()" class="bg-red-600 px-8 py-3 rounded-full font-black">退出</button>
            </div>
            <div class="flex-1 relative">
                <video id="videoFeed" class="absolute inset-0 w-full h-full object-cover"></video>
                <div class="absolute inset-0 flex items-center justify-center">
                    <div class="w-72 h-48 border-2 border-white/40 rounded-2xl relative overflow-hidden bg-white/5">
                        <div class="scanner-line"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('SR_V6_DATA')) || [];
        let cols = JSON.parse(localStorage.getItem('SR_V6_COLS')) || [];
        let widths = JSON.parse(localStorage.getItem('SR_V6_WIDTHS')) || {};
        let swapIdx = null; // 用于存放第一个选中的列索引

        const codeReader = new ZXing.BrowserMultiFormatReader();

        function init() {
            if (cols.length) render();
            document.getElementById('fileInput').onchange = loadExcel;
            document.getElementById('manualInput').onkeydown = (e) => e.key === 'Enter' && processCode(e.target.value);
        }

        function render() {
            const head = document.getElementById('tHead');
            const body = document.getElementById('tBody');
            
            // 渲染表头
            head.innerHTML = `<tr>${cols.map((c, i) => `
                <th class="bg-slate-50 ${swapIdx === i ? 'swapping' : ''}" style="width: ${widths[c] || 150}px">
                    <div class="flex flex-col gap-2">
                        <span class="truncate text-slate-800 font-black">${c}</span>
                        <button onclick="prepareSwap(${i})" class="text-[10px] w-fit border border-blue-400 text-blue-600 px-2 py-1 rounded bg-white font-bold active:bg-blue-600 active:text-white">
                            ↔️ 交换位置
                        </button>
                    </div>
                    <div class="resizer" ontouchstart="startResizing(event, '${c}')"></div>
                </th>`).join('')}</tr>`;

            // 渲染内容
            body.innerHTML = db.map((row, rIdx) => `
                <tr class="even:bg-slate-50/50" id="row-${rIdx}">
                    ${cols.map(c => `
                        <td class="p-1 border-r border-slate-200">
                            <input type="${c==='实际数量'?'number':'text'}" 
                                value="${row[c]||''}" 
                                class="w-full h-11 px-2 outline-none bg-transparent ${c==='实际数量'?'qty-input':''}"
                                onchange="edit(${rIdx},'${c}',this.value)"
                                ${c==='实际数量'?'inputmode="decimal"':''}/>
                        </td>`).join('')}
                </tr>`).join('');
        }

        // 核心：交换位置逻辑
        function prepareSwap(idx) {
            if (swapIdx === null) {
                swapIdx = idx; // 选中第一列
                render();
            } else {
                // 选中第二列，开始对调
                const temp = cols[swapIdx];
                cols[swapIdx] = cols[idx];
                cols[idx] = temp;
                swapIdx = null; // 重置
                save(); render();
            }
        }

        // 核心：列宽拖动
        function startResizing(e, colName) {
            const startX = e.touches[0].pageX;
            const startW = widths[colName] || 150;
            const onMove = (ev) => {
                const currentX = ev.touches[0].pageX;
                widths[colName] = Math.max(70, startW + (currentX - startX));
                render();
            };
            const onEnd = () => {
                document.removeEventListener('touchmove', onMove);
                document.removeEventListener('touchend', onEnd);
                save();
            };
            document.addEventListener('touchmove', onMove, { passive: false });
            document.addEventListener('touchend', onEnd, { once: true });
        }

        // 连续扫码逻辑
        async function startContinuousScan() {
            document.getElementById('scannerModal').style.display = 'flex';
            try {
                codeReader.decodeFromConstraints({ video: { facingMode: "environment", width: { ideal: 1920 } } }, 'videoFeed', (result) => {
                    if (result) {
                        ding();
                        document.getElementById('scanFeedback').innerText = "扫码成功: " + result.getText();
                        processCode(result.getText(), false);
                    }
                });
            } catch (e) { alert("相机启动失败"); stopScan(); }
        }

        function stopScan() { codeReader.reset(); document.getElementById('scannerModal').style.display = 'none'; }

        function processCode(code, scroll = true) {
            const barKey = cols.find(c => c.includes('条') || c.includes('码') || c.includes('COD')) || cols[0];
            const idx = db.findIndex(r => String(r[barKey]).trim() === String(code).trim());
            if (idx !== -1) {
                db[idx]['实际数量'] = (parseFloat(db[idx]['实际数量']) || 0) + 1;
                save(); render();
                if (scroll) document.getElementById(`row-${idx}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function ding() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.connect(g); g.connect(ctx.destination);
            osc.frequency.value = 1000;
            g.gain.linearRampToValueAtTime(0.2, ctx.currentTime + 0.05);
            g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
            osc.start(); osc.stop(ctx.currentTime + 0.2);
            if (navigator.vibrate) navigator.vibrate(80);
        }

        function edit(idx, col, val) { db[idx][col] = val; save(); }
        function save() { 
            localStorage.setItem('SR_V6_DATA', JSON.stringify(db)); 
            localStorage.setItem('SR_V6_COLS', JSON.stringify(cols)); 
            localStorage.setItem('SR_V6_WIDTHS', JSON.stringify(widths));
        }

        function loadExcel(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const data = XLSX.utils.sheet_to_json(XLSX.read(ev.target.result, { type: 'binary' }).Sheets[XLSX.read(ev.target.result, { type: 'binary' }).SheetNames[0]], { defval: "" });
                cols = Object.keys(data[0]);
                if (!cols.includes('实际数量')) cols.unshift('实际数量');
                db = data; save(); render();
            };
            reader.readAsBinaryString(e.target.files[0]);
        }

        function exportData() {
            const ws = XLSX.utils.json_to_sheet(db, { header: cols });
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Inventory");
            XLSX.writeFile(wb, `Stock_V6.xlsx`);
        }

        function resetSystem() { if(confirm("重置系统？数据将消失！")) { localStorage.clear(); location.reload(); } }
        init();
    </script>
</body>
</html>
