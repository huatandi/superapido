<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>SuperRapido V32 - 终极稳定版</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@0.19.1"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; touch-action: pan-x pan-y; font-family: sans-serif; }
        .table-container { background: white; border: 2px solid #1e293b; height: 62vh; overflow: auto; border-radius: 12px; position: relative; }
        table { border-collapse: separate; border-spacing: 0; table-layout: fixed; width: max-content; }
        th { position: sticky; top: 0; z-index: 50; background: #0f172a; color: white; border-right: 1px solid #334155; border-bottom: 3px solid #000; padding: 12px; font-size: 13px; overflow: hidden; }
        .resizer { position: absolute; right: 0; top: 0; height: 100%; width: 15px; cursor: col-resize; z-index: 60; }
        td { border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; padding: 2px; background: white; }
        .qty-input { width: 100%; height: 60px; border: 4px solid #2563eb !important; text-align: center; font-size: 2rem; font-weight: 900; color: #000; border-radius: 8px; }
        .row-focus { background-color: #fef08a !important; outline: 6px solid #ef4444; outline-offset: -6px; z-index: 10; }
        #toast { position: fixed; top: 10%; left: 50%; transform: translateX(-50%); color: white; padding: 15px; border-radius: 20px; z-index: 10000; display: none; font-weight: 900; text-align: center; width: 85%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #colModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center; }
    </style>
</head>
<body class="p-2">
    <div id="toast"></div>

    <div id="colModal">
        <div class="bg-white w-11/12 max-h-[85vh] rounded-3xl p-6 overflow-auto">
            <h2 class="text-xl font-black mb-4 border-b pb-2">列管理 (Gestión)</h2>
            <div id="colList" class="space-y-2 mb-6"></div>
            <div class="flex gap-2 p-2 bg-slate-100 rounded-2xl">
                <input type="text" id="newColName" placeholder="输入新列名..." class="flex-1 bg-transparent p-2 outline-none font-bold" />
                <button onclick="addColumn()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">添加</button>
            </div>
            <button onclick="document.getElementById('colModal').style.display='none'" class="w-full mt-6 bg-slate-900 text-white py-4 rounded-2xl font-black">保存并关闭</button>
        </div>
    </div>

    <div class="flex flex-col h-screen">
        <div class="flex justify-between items-center mb-2">
            <h1 class="text-xl font-black text-slate-900">V32 <span class="bg-green-500 text-white text-[10px] px-2 py-0.5 rounded-full ml-1">ULTIMATE</span></h1>
            <div class="flex gap-2">
                <button onclick="openColModal()" class="bg-slate-700 text-white text-[10px] px-3 py-2 rounded-full font-bold">列管理</button>
                <button onclick="hardReset()" class="bg-red-600 text-white text-[10px] px-3 py-2 rounded-full font-bold">重置</button>
            </div>
        </div>

        <div class="flex gap-1 mb-3 bg-white p-2 rounded-2xl shadow-lg border-2 border-slate-200">
            <button onclick="startScanning()" class="bg-blue-600 text-white w-14 h-14 flex items-center justify-center rounded-xl active:scale-90 text-2xl">📷</button>
            <div class="flex-1 flex gap-1">
                <input type="text" id="manualInput" placeholder="点击此框扫码/手动输入..." autofocus
                    class="flex-1 border-4 border-blue-100 rounded-xl px-3 font-bold outline-none focus:border-blue-500" />
                <button onclick="handleBarcode(manualInput.value)" class="bg-slate-800 text-white px-4 rounded-xl font-black text-xs">确认</button>
            </div>
            <label class="bg-slate-100 text-slate-500 w-12 h-14 flex items-center justify-center rounded-xl border border-slate-300">
                📂<input type="file" id="fileInput" class="hidden" accept=".xlsx, .xls" />
            </label>
        </div>

        <div class="table-container shadow-2xl">
            <table><thead id="tHead"></thead><tbody id="tBody"></tbody></table>
        </div>

        <button onclick="exportExcel()" class="mt-3 bg-emerald-700 text-white py-5 rounded-2xl font-black text-2xl shadow-xl active:bg-emerald-900">💾 导出保存 EXCEL</button>
    </div>

    <div id="scanUI" class="fixed inset-0 bg-black z-[999] hidden flex-col">
        <div class="p-4 flex justify-between items-center bg-slate-900 text-white border-b border-green-500">
            <span class="font-bold text-green-400 italic">FLASH SCANNING...</span>
            <button onclick="stopScanning()" class="bg-red-600 px-8 py-2 rounded-full font-bold shadow-lg">退出</button>
        </div>
        <div class="relative flex-1 bg-black">
            <video id="v" class="w-full h-full object-cover"></video>
            <div class="absolute inset-x-8 top-1/4 bottom-1/4 border-2 border-green-500/30 pointer-events-none shadow-[0_0_0_2000px_rgba(0,0,0,0.6)]">
                <div class="w-full h-1 bg-green-400 shadow-[0_0_15px_#4ade80] animate-pulse absolute top-1/2"></div>
            </div>
        </div>
    </div>

    <script>
        const VER = "SR32_FINAL";
        let db = JSON.parse(localStorage.getItem(VER+'_DATA')) || [];
        let columns = JSON.parse(localStorage.getItem(VER+'_COLS')) || [];
        let widths = JSON.parse(localStorage.getItem(VER+'_W')) || {};

        const zxing = new ZXing.BrowserMultiFormatReader();
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playFeedback(isSuccess) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(isSuccess ? 1200 : 180, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        const manualInput = document.getElementById('manualInput');

        // 统一查表逻辑 (扫码枪 & 摄像头通用)
        function handleBarcode(code) {
            if(!code) return;
            const target = String(code).trim().toLowerCase();
            manualInput.value = ''; // 扫完即空

            const idx = db.findIndex(row => Object.values(row).some(v => String(v).trim().toLowerCase() === target));

            if (idx !== -1) {
                playFeedback(true);
                render();
                const rowEl = document.getElementById(`r-${idx}`);
                const inputEl = document.getElementById(`in-${idx}-实际数量`);
                document.querySelectorAll('tr').forEach(tr => tr.classList.remove('row-focus'));
                if (rowEl) {
                    rowEl.classList.add('row-focus');
                    rowEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    setTimeout(() => { if(inputEl){inputEl.focus(); inputEl.select();} }, 300);
                }
                stopScanning();
            } else { 
                playFeedback(false); 
                showMsg(target); 
            }
        }

        // 监听扫码枪 Enter 键
        manualInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleBarcode(manualInput.value);
            }
        });

        function showMsg(txt) {
            const el = document.getElementById('toast'); 
            el.innerHTML = `⚠️ 库里没这货: ${txt}`;
            el.style.display = 'block'; el.style.background = '#ef4444';
            setTimeout(() => el.style.display = 'none', 2000);
        }

        // 摄像头扫码功能
        async function startScanning() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('scanUI').style.display = 'flex';
            zxing.decodeFromConstraints({video:{facingMode:"environment"}}, 'v', (res) => { 
                if (res) { handleBarcode(res.getText()); }
            });
        }
        function stopScanning() { zxing.reset(); document.getElementById('scanUI').style.display = 'none'; }

        // --- 列管理核心逻辑 ---
        function openColModal() {
            document.getElementById('colModal').style.display = 'flex';
            renderColList();
        }

        function renderColList() {
            const list = document.getElementById('colList');
            list.innerHTML = columns.map((c, i) => `
                <div class="flex items-center justify-between bg-slate-50 p-4 rounded-2xl border border-slate-200">
                    <span class="font-black text-slate-700">${c}</span>
                    <div class="flex gap-2">
                        <button onclick="moveCol(${i}, -1)" class="w-10 h-10 flex items-center justify-center bg-white border shadow-sm rounded-lg active:bg-slate-200 text-xl">⬆️</button>
                        <button onclick="moveCol(${i}, 1)" class="w-10 h-10 flex items-center justify-center bg-white border shadow-sm rounded-lg active:bg-slate-200 text-xl">⬇️</button>
                        <button onclick="deleteCol('${c}')" class="w-10 h-10 flex items-center justify-center bg-red-50 border border-red-200 text-red-500 rounded-lg active:bg-red-100 font-bold">❌</button>
                    </div>
                </div>
            `).join('');
        }

        function moveCol(index, dir) {
            const target = index + dir;
            if (target >= 0 && target < columns.length) {
                [columns[index], columns[target]] = [columns[target], columns[index]];
                renderColList(); push(); render();
            }
        }

        function addColumn() {
            const name = document.getElementById('newColName').value.trim();
            if (name && !columns.includes(name)) {
                columns.push(name);
                db.forEach(row => row[name] = "");
                document.getElementById('newColName').value = "";
                renderColList(); push(); render();
            }
        }

        function deleteCol(name) {
            if (confirm(`确定删除列 "${name}" 吗？此操作不可撤销。`)) {
                columns = columns.filter(c => c !== name);
                push(); renderColList(); render();
            }
        }

        // --- 表格渲染与拉伸 ---
        function render() {
            const h = document.getElementById('tHead'); const b = document.getElementById('tBody');
            if (!columns.length) return;
            h.innerHTML = `<tr>${columns.map(c => `
                <th id="th-${c}" style="width: ${
