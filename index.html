<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>SuperRapido V50 Pro - Fast Scan</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@0.19.1"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; touch-action: pan-x pan-y; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .table-container { background: white; border: 2px solid #1e293b; height: 50vh; overflow: auto; border-radius: 12px; }
        table { border-collapse: separate; border-spacing: 0; table-layout: fixed; width: max-content; }
        th { position: sticky; top: 0; z-index: 50; background: #0f172a; color: white; border-right: 1px solid #334155; border-bottom: 3px solid #000; padding: 12px; font-size: 13px; text-align: left; }
        td { border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; padding: 2px; }
        .qty-input { width: 100%; height: 60px; border: 4px solid #2563eb !important; text-align: center; font-size: 2rem; font-weight: 900; color: #1e40af; border-radius: 8px; }
        .row-focus { background-color: #fef08a !important; outline: 6px solid #ef4444; outline-offset: -6px; }
        
        /* 扫描界面优化 */
        #scanUI { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; }
        .video-wrapper { position: relative; flex: 1; overflow: hidden; }
        #v { width: 100%; height: 100%; object-fit: cover; }
        
        /* 扫描框：引导用户将条码放入中心，提升识别率 */
        .scan-guide { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; height: 180px; border: 2px solid #3b82f6; border-radius: 12px; z-index: 20; box-shadow: 0 0 0 4000px rgba(0,0,0,0.5); }
        .scan-line { position: absolute; width: 100%; height: 2px; background: #3b82f6; top: 0; animation: scanMove 1.5s infinite linear; box-shadow: 0 0 10px #3b82f6; }
        @keyframes scanMove { 0% { top: 0%; } 100% { top: 100%; } }

        /* Toast 提示 */
        #toast { position: fixed; top: 20%; left: 50%; transform: translateX(-50%); background: rgba(239, 68, 68, 0.9); color: white; padding: 12px 24px; border-radius: 50px; z-index: 10001; display: none; font-weight: bold; }
        #colModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:9999; align-items:center; justify-content:center; }
        .giant-cam-btn { width: 80px; height: 80px; font-size: 40px; background: #2563eb; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 4px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body class="p-2">
    <div id="toast"></div>

    <div id="colModal">
        <div class="bg-white w-11/12 max-h-[80vh] rounded-3xl p-6 overflow-auto border-4 border-slate-900 shadow-2xl">
            <h2 class="text-xl font-black mb-4 border-b-2 pb-2">列管理 / Columnas</h2>
            <div id="colList" class="space-y-2 mb-4"></div>
            <div class="flex gap-2 p-2 bg-slate-100 rounded-xl">
                <input type="text" id="newColName" placeholder="新列名..." class="flex-1 bg-transparent font-bold p-2 outline-none" />
                <button onclick="addColumn()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold">添加</button>
            </div>
            <button onclick="closeColModal()" class="w-full mt-4 bg-slate-900 text-white py-4 rounded-xl font-black">返回主页</button>
        </div>
    </div>

    <div class="flex flex-col h-screen">
        <div class="flex items-center justify-between mb-2">
            <h1 class="text-2xl font-black italic">V50 PRO</h1>
            <div class="flex gap-2">
                <button onclick="openColModal()" class="bg-slate-800 text-white px-3 py-2 rounded-lg text-xs font-bold">列管理</button>
                <button onclick="hardReset()" class="bg-red-600 text-white px-3 py-2 rounded-lg text-xs font-bold">重置</button>
            </div>
        </div>

        <div class="bg-white p-3 rounded-2xl shadow-lg mb-3 flex items-center gap-3">
            <button onclick="startScanning()" class="giant-cam-btn active:scale-90">📷</button>
            <div class="flex-1">
                <input type="text" id="manualInput" placeholder="手动输入条码..." class="w-full border-2 border-blue-100 rounded-lg px-3 py-2 mb-2 font-bold focus:border-blue-500 outline-none" />
                <button id="confirmBtn" class="w-full bg-blue-600 text-white py-2 rounded-lg font-black italic">确认 / CONFIRM</button>
            </div>
        </div>

        <div class="table-container shadow-inner border-2 border-slate-200">
            <table id="mainTable"><thead id="tHead"></thead><tbody id="tBody"></tbody></table>
        </div>

        <div class="mt-auto pt-2">
            <label class="block w-full bg-slate-200 text-slate-700 text-center py-2 rounded-lg font-bold text-xs mb-2 cursor-pointer">
                导入 EXCEL <input type="file" id="fileInput" class="hidden" accept=".xlsx, .xls" />
            </label>
            <button onclick="exportExcel()" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-black text-xl shadow-lg border-b-4 border-emerald-800 active:translate-y-1">导出 EXCEL</button>
        </div>
    </div>

    <div id="scanUI">
        <div class="p-4 flex justify-between items-center bg-slate-900 text-white">
            <span class="font-bold text-blue-400">极速扫描模式</span>
            <button onclick="stopScanning()" class="bg-red-600 px-6 py-2 rounded-full text-sm font-bold">退出</button>
        </div>
        <div class="video-wrapper">
            <video id="v" playsinline muted></video>
            <div class="scan-guide">
                <div class="scan-line"></div>
            </div>
            <div class="absolute bottom-10 left-0 w-full text-center text-white text-xs px-10 opacity-70">
                请将条码置于蓝色框内，光线暗时请尝试靠近灯光
            </div>
        </div>
    </div>

    <script>
        const VER = "SR_V50_FAST";
        let db = []; let columns = []; let widths = {};
        let lastCode = ""; let lastTime = 0;

        // 初始化数据
        try {
            db = JSON.parse(localStorage.getItem(VER+'_DATA')) || [];
            columns = JSON.parse(localStorage.getItem(VER+'_COLS')) || [];
            widths = JSON.parse(localStorage.getItem(VER+'_W')) || {};
        } catch(e) {}

        const zxing = new ZXing.BrowserMultiFormatReader();
        // 关键性能优化：大幅减少解码尝试间隔，增加吞吐率
        zxing.timeBetweenDecodingAttempts = 30; 

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        function playSound(ok) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const o = ctx.createOscillator(); const g = ctx.createGain();
                o.connect(g); g.connect(ctx.destination);
                o.frequency.setValueAtTime(ok ? 1200 : 300, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                o.start(); o.stop(ctx.currentTime + 0.1);
            } catch(e) {}
        }

        async function startScanning() {
            document.getElementById('scanUI').style.display = 'flex';
            try {
                // 优化视频参数：请求高帧率
                const constraints = {
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 60 } }
                };
                
                zxing.decodeFromConstraints(constraints, 'v', (res) => {
                    if (res) {
                        const code = res.getText();
                        const now = Date.now();
                        if (code === lastCode && (now - lastTime < 2000)) return;
                        lastCode = code; lastTime = now;
                        handleBarcode(code, true);
                    }
                });

                // 自动对焦补丁
                const track = document.getElementById('v').srcObject?.getVideoTracks()[0];
                if (track && track.getCapabilities()?.focusMode?.includes('continuous')) {
                    track.applyConstraints({advanced: [{focusMode: 'continuous'}]}).catch(()=>{});
                }
            } catch (err) { alert("相机开启失败"); stopScanning(); }
        }

        function stopScanning() { zxing.reset(); document.getElementById('scanUI').style.display = 'none'; }

        function handleBarcode(code, fromCam = false) {
            if(!code) return;
            const target = String(code).trim().toLowerCase();
            document.getElementById('manualInput').value = '';
            const idx = db.findIndex(row => Object.values(row).some(v => v !== null && String(v).trim().toLowerCase() === target));
            
            if (idx !== -1) {
                playSound(true); render();
                if(fromCam) stopScanning();
                setTimeout(() => {
                    const rowEl = document.getElementById(`r-${idx}`);
                    const inputEl = document.getElementById(`in-${idx}-实际数量`);
                    document.querySelectorAll('tr').forEach(tr => tr.classList.remove('row-focus'));
                    if (rowEl) {
                        rowEl.classList.add('row-focus');
                        rowEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        if(inputEl){ inputEl.focus(); inputEl.select(); }
                    }
                }, 300);
            } else {
                playSound(false);
                showToast("⚠️ 未找到: " + target);
            }
        }

        // 表格渲染与数据处理逻辑 (保持原有逻辑并修复列管理)
        function render() {
            const h = document.getElementById('tHead'); const b = document.getElementById('tBody');
            if (!columns.length) return;
            h.innerHTML = `<tr>${columns.map(c => `<th style="width:${widths[c]||120}px">${c}</th>`).join('')}</tr>`;
            b.innerHTML = db.map((row, rIdx) => `
                <tr id="r-${rIdx}">
                    ${columns.map(c => {
                        const isQty = c === '实际数量';
                        return `<td><input id="in-${rIdx}-${c}" type="${isQty?'number':'text'}" value="${row[c]||''}" class="${isQty?'qty-input':'p-2 w-full text-xs outline-none bg-transparent'}" onchange="saveVal(${rIdx},'${c}',this.value)" /></td>`;
                    }).join('')}
                </tr>`).join('');
        }

        function saveVal(r, c, v) { db[r][c] = v; push(); }
        function push() { 
            localStorage.setItem(VER+'_DATA', JSON.stringify(db)); 
            localStorage.setItem(VER+'_COLS', JSON.stringify(columns)); 
            localStorage.setItem(VER+'_W', JSON.stringify(widths)); 
        }

        // 列管理
        function openColModal() { document.getElementById('colModal').style.display = 'flex'; renderColList(); }
        function closeColModal() { document.getElementById('colModal').style.display = 'none'; render(); }
        function renderColList() {
            document.getElementById('colList').innerHTML = columns.map((c, i) => `
                <div class="flex items-center justify-between bg-slate-50 p-3 rounded-xl border">
                    <span class="font-bold text-slate-700">${c}</span>
                    <div class="flex gap-1">
                        <button onclick="moveCol(${i},-1)" class="px-2 py-1 bg-white border rounded ${i===0?'opacity-10':''}">⬆️</button>
                        <button onclick="moveCol(${i},1)" class="px-2 py-1 bg-white border rounded ${i===columns.length-1?'opacity-10':''}">⬇️</button>
                        <button onclick="deleteCol('${c}')" class="px-2 py-1 text-red-600 font-bold">×</button>
                    </div>
                </div>`).join('');
        }
        function moveCol(i, d) { 
            let t = i + d; 
            if (t>=0 && t<columns.length) { [columns[i], columns[t]] = [columns[t], columns[i]]; renderColList(); push(); } 
        }
        function addColumn() {
            const n = document.getElementById('newColName').value.trim();
            if (n && !columns.includes(n)) { columns.push(n); db.forEach(r => r[n] = ""); document.getElementById('newColName').value=""; renderColList(); push(); }
        }
        function deleteCol(n) { if(confirm("删除该列？")) { columns = columns.filter(c => c !== n); renderColList(); push(); } }

        // 文件处理
        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0]; if (!file) return;
            const r = new FileReader();
            r.onload = (ev) => {
                const data = new Uint8Array(ev.target.result);
                const wb = XLSX.read(data, { type: 'array' });
                const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" });
                if (json.length) {
                    columns = Object.keys(json[0]);
                    if (!columns.includes('实际数量')) columns.unshift('实际数量');
                    db = json; push(); render(); 
                }
            };
            r.readAsArrayBuffer(file);
        };

        function exportExcel() {
            const ws = XLSX.utils.json_to_sheet(db, { header: columns });
            const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Inventory");
            XLSX.writeFile(wb, `Stock_${new Date().getTime()}.xlsx`);
        }
        function hardReset() { if(confirm("重置所有数据？")) { localStorage.clear(); location.reload(); } }
        document.getElementById('confirmBtn').onclick = () => handleBarcode(document.getElementById('manualInput').value);
        document.getElementById('manualInput').onkeydown = (e) => { if(e.key==='Enter') handleBarcode(e.target.value); };

        if (columns.length) render();
    </script>
</body>
</html>
