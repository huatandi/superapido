<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>V50 Ultra-Sense PRO</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@0.19.1"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; touch-action: pan-x pan-y; font-family: sans-serif; }
        .table-container { background: white; border: 2px solid #1e293b; height: 50vh; overflow: auto; border-radius: 12px; }
        table { border-collapse: separate; border-spacing: 0; table-layout: fixed; width: max-content; }
        th { position: sticky; top: 0; z-index: 50; background: #0f172a; color: white; padding: 12px; font-size: 13px; text-align: left; border-right: 1px solid #334155; }
        td { border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; padding: 2px; }
        .qty-input { width: 100%; height: 60px; border: 4px solid #2563eb !important; text-align: center; font-size: 2rem; font-weight: 900; color: #1e40af; border-radius: 8px; background: #fff; }
        .row-focus { background-color: #fef08a !important; outline: 6px solid #ef4444; outline-offset: -6px; }
        
        #scanUI { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; }
        #v { width: 100%; height: 100%; object-fit: cover; filter: contrast(1.2) brightness(1.1); }
        .scan-window { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 80%; height: 200px; border: 4px solid #3b82f6; border-radius: 20px; z-index: 20; box-shadow: 0 0 0 4000px rgba(0,0,0,0.6); }
        .scan-laser { position: absolute; width: 100%; height: 4px; background: #ef4444; top: 0; animation: laserMove 2s infinite linear; box-shadow: 0 0 15px #ef4444; }
        @keyframes laserMove { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }

        #toast { position: fixed; top: 15%; left: 50%; transform: translateX(-50%); background: rgba(220, 38, 38, 0.9); color: white; padding: 16px 32px; border-radius: 12px; z-index: 10001; display: none; font-weight: bold; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
    </style>
</head>
<body class="p-2">
    <div id="toast"></div>

    <div id="colModal" class="fixed inset-0 bg-black/80 z-[9999] hidden items-center justify-center">
        <div class="bg-white w-11/12 max-h-[85vh] rounded-3xl p-6 overflow-auto border-4 border-slate-900 shadow-2xl">
            <h2 class="text-2xl font-black mb-4 italic text-center">列管理 / Columnas</h2>
            <div id="colList" class="space-y-3 mb-6"></div>
            <div class="flex gap-2 p-3 bg-slate-100 rounded-2xl border-2">
                <input type="text" id="newColName" placeholder="输入新列名..." class="flex-1 bg-transparent font-bold outline-none" />
                <button onclick="addColumn()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">增加</button>
            </div>
            <button onclick="closeColModal()" class="w-full mt-6 bg-slate-900 text-white py-5 rounded-2xl font-black text-xl active:scale-95">完成并返回</button>
        </div>
    </div>

    <div class="flex flex-col h-screen">
        <div class="flex items-center justify-between mb-2 px-1">
            <h1 class="text-3xl font-black italic text-slate-800">V50 <span class="text-blue-600 text-sm italic">ULTRA</span></h1>
            <div class="flex gap-2">
                <button onclick="openColModal()" class="bg-slate-700 text-white px-4 py-2 rounded-xl font-bold text-xs shadow-md">列管理</button>
                <button onclick="hardReset()" class="bg-red-500 text-white px-4 py-2 rounded-xl font-bold text-xs shadow-md">重置</button>
            </div>
        </div>

        <div class="bg-white p-4 rounded-3xl shadow-xl flex items-center gap-4 border-2 border-slate-100 mb-4">
            <button onclick="startScanning()" class="w-24 h-24 bg-blue-600 rounded-full text-5xl shadow-lg active:scale-90 flex items-center justify-center text-white">📷</button>
            <div class="flex-1">
                <input type="text" id="manualInput" placeholder="点击手动输入条码..." class="w-full border-b-4 border-blue-200 p-2 text-lg font-bold outline-none focus:border-blue-600 mb-2" />
                <button onclick="handleManual()" class="w-full bg-slate-800 text-white py-3 rounded-xl font-black shadow-lg">确认录入 / Confirmar</button>
            </div>
        </div>

        <div class="table-container shadow-inner border-2 border-slate-200">
            <table id="mainTable"><thead id="tHead"></thead><tbody id="tBody"></tbody></table>
        </div>

        <div class="mt-4 space-y-2">
            <label class="block w-full bg-slate-100 text-slate-500 text-center py-4 rounded-xl font-black text-sm cursor-pointer border-2 border-dashed border-slate-300 active:bg-slate-200">
                📂 导入 EXCEL 文件 <input type="file" id="fileInput" class="hidden" accept=".xlsx, .xls" />
            </label>
            <button onclick="exportExcel()" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black text-2xl shadow-xl border-b-8 border-emerald-800 active:translate-y-1 transition-all">💾 导出保存 Excel</button>
        </div>
    </div>

    <div id="scanUI">
        <div class="p-6 flex justify-between items-center text-white z-50 bg-slate-900/50">
            <div class="bg-blue-600 px-4 py-1 rounded-full text-xs font-bold animate-pulse italic">AI 智能识别中...</div>
            <button onclick="stopScanning()" class="bg-red-600 px-8 py-3 rounded-2xl font-black">退出扫描</button>
        </div>
        <div class="relative flex-1">
            <video id="v" playsinline muted></video>
            <div class="scan-window">
                <div class="scan-laser"></div>
            </div>
            <div class="absolute bottom-10 left-0 w-full text-center text-white/70 text-xs px-10">
                摆不正也能扫 | 弱光请微调角度 | 自动增强对比度
            </div>
        </div>
    </div>

    <script>
        const VER = "SR_V50_ULTRA_FIXED";
        let db = []; let columns = []; let widths = {};
        let lastCode = ""; let lastTime = 0;

        // 初始化加载数据
        function initData() {
            try {
                db = JSON.parse(localStorage.getItem(VER+'_DATA')) || [];
                columns = JSON.parse(localStorage.getItem(VER+'_COLS')) || [];
                widths = JSON.parse(localStorage.getItem(VER+'_W')) || {};
                if (columns.length) render();
            } catch(e) { console.error("Data Load Error", e); }
        }

        // 扫码配置
        const hints = new Map();
        hints.set(ZXing.DecodeHintType.TRY_HARDER, true); 
        hints.set(ZXing.DecodeHintType.CHARACTER_SET, 'utf-8');
        const zxing = new ZXing.BrowserMultiFormatReader(hints);
        zxing.timeBetweenDecodingAttempts = 30;

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function playSound(ok) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const o = ctx.createOscillator(); const g = ctx.createGain();
                o.connect(g); g.connect(ctx.destination);
                o.frequency.setValueAtTime(ok ? 1000 : 250, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
                o.start(); o.stop(ctx.currentTime + 0.15);
            } catch(e) {}
        }

        async function startScanning() {
            document.getElementById('scanUI').style.display = 'flex';
            try {
                const constraints = { video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 60 } } };
                zxing.decodeFromConstraints(constraints, 'v', (res) => {
                    if (res) {
                        const code = res.getText();
                        const now = Date.now();
                        if (code === lastCode && (now - lastTime < 1800)) return;
                        lastCode = code; lastTime = now;
                        handleBarcode(code, true);
                    }
                });
            } catch (err) { stopScanning(); alert("相机启动失败，请检查权限"); }
        }

        function stopScanning() { zxing.reset(); document.getElementById('scanUI').style.display = 'none'; }

        function handleBarcode(code, fromCam = false) {
            if(!code) return;
            const target = String(code).trim().toLowerCase();
            const idx = db.findIndex(row => Object.values(row).some(v => v && String(v).trim().toLowerCase() === target));
            
            if (idx !== -1) {
                playSound(true);
                if(fromCam) stopScanning();
                render();
                setTimeout(() => {
                    const row = document.getElementById(`r-${idx}`);
                    const input = document.getElementById(`in-${idx}-实际数量`);
                    document.querySelectorAll('tr').forEach(t => t.classList.remove('row-focus'));
                    if (row) {
                        row.classList.add('row-focus');
                        row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        if(input){ input.focus(); input.select(); }
                    }
                }, 300);
            } else {
                playSound(false);
                showToast("⚠️ 库中未找到: " + target);
            }
        }

        function handleManual() {
            const val = document.getElementById('manualInput').value;
            if(val) handleBarcode(val);
            document.getElementById('manualInput').value = '';
        }

        // 文件导入功能修复
        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = new Uint8Array(ev.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(ws, { defval: "" });
                    
                    if (json.length > 0) {
                        // 提取所有可能的列名
                        let allKeys = [];
                        json.forEach(item => {
                            Object.keys(item).forEach(key => {
                                if(!allKeys.includes(key)) allKeys.push(key);
                            });
                        });
                        
                        columns = allKeys;
                        // 确保“实际数量”列在最前面
                        if (!columns.includes('实际数量')) {
                            columns.unshift('实际数量');
                        } else {
                            columns = ['实际数量', ...columns.filter(c => c !== '实际数量')];
                        }
                        
                        db = json;
                        push(); // 保存到本地
                        render(); // 刷新表格
                        showToast("✅ 导入成功！共 " + db.length + " 条数据");
                    }
                } catch (err) {
                    alert("文件读取失败，请确保是标准的 Excel 文件");
                    console.error(err);
                }
            };
            reader.readAsArrayBuffer(file);
            e.target.value = ''; // 清空选择
        };

        function render() {
            const h = document.getElementById('tHead');
            const b = document.getElementById('tBody');
            if (!columns.length) return;
            
            h.innerHTML = `<tr>${columns.map(c => `<th style="width:${widths[c]||130}px">${c}</th>`).join('')}</tr>`;
            b.innerHTML = db.map((row, rIdx) => `
                <tr id="r-${rIdx}">
                    ${columns.map(c => {
                        const isQty = c === '实际数量';
                        return `<td><input id="in-${rIdx}-${c}" type="${isQty?'number':'text'}" value="${row[c]||''}" class="${isQty?'qty-input':'p-2 w-full text-sm outline-none bg-transparent'}" onchange="saveVal(${rIdx},'${c}',this.value)" /></td>`;
                    }).join('')}
                </tr>`).join('');
        }

        function saveVal(r, c, v) { db[r][c] = v; push(); }
        function push() { 
            localStorage.setItem(VER+'_DATA', JSON.stringify(db)); 
            localStorage.setItem(VER+'_COLS', JSON.stringify(columns)); 
            localStorage.setItem(VER+'_W', JSON.stringify(widths)); 
        }

        // 列管理
        function openColModal() { document.getElementById('colModal').style.display = 'flex'; renderColList(); }
        function closeColModal() { document.getElementById('colModal').style.display = 'none'; render(); }
        function renderColList() {
            document.getElementById('colList').innerHTML = columns.map((c, i) => `
                <div class="flex items-center justify-between bg-white p-3 rounded-xl border-2 border-slate-200">
                    <span class="font-bold text-slate-700">${c}</span>
                    <div class="flex gap-2">
                        <button onclick="moveCol(${i},-1)" class="p-2 border rounded-lg bg-slate-50 ${i===0?'opacity-20':''}">⬆️</button>
                        <button onclick="moveCol(${i},1)" class="p-2 border rounded-lg bg-slate-50 ${i===columns.length-1?'opacity-20':''}">⬇️</button>
                        <button onclick="deleteCol('${c}')" class="p-2 text-red-500 font-bold ml-2">删除</button>
                    </div>
                </div>`).join('');
        }
        function moveCol(i, d) {
            let t = i + d;
            if (t >= 0 && t < columns.length) { [columns[i], columns[t]] = [columns[t], columns[i]]; renderColList(); push(); }
        }
        function addColumn() {
            const n = document.getElementById('newColName').value.trim();
            if (n && !columns.includes(n)) { columns.push(n); db.forEach(r => r[n] = ""); document.getElementById('newColName').value=""; renderColList(); push(); }
        }
        function deleteCol(n) { if(confirm("确定删除该列吗？")) { columns = columns.filter(c => c !== n); renderColList(); push(); } }

        function exportExcel() {
            if(!db.length) return alert("没有数据可以导出");
            const ws = XLSX.utils.json_to_sheet(db, { header: columns });
            const wb = XLSX.utils.book_new(); 
            XLSX.utils.book_append_sheet(wb, ws, "Inventory");
            XLSX.writeFile(wb, `Stock_V50_Export_${new Date().getTime()}.xlsx`);
        }
        
        function hardReset() { if(confirm("⚠️ 确定要清空所有数据重新开始吗？")) { localStorage.clear(); location.reload(); } }

        window.onload = initData;
    </script>
</body>
</html>
